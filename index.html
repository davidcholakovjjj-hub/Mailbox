<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Socialbox</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0e0f11;--bg1:#161719;--bg2:#1e1f22;--bg3:#27282c;
  --border:#2e2f34;--border2:#3a3b42;
  --text:#e8e9ec;--text2:#9a9ba6;--text3:#5c5d68;
  --accent:#5b7fff;--accent2:#7b96ff;
  --red:#f46b6b;--green:#3ecf8e;--amber:#f5a623;
  --r:10px;--rs:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--text);height:100vh;overflow:hidden}
#root{height:100vh;display:flex;flex-direction:column}

/* LOADING */
.loading{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--text3)}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH */
.auth-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
.auth-card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:32px;width:400px;max-width:100%}
.logo{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;margin-bottom:4px}
.logo span{color:var(--accent)}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:8px;background:none;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:13px;color:var(--text2);cursor:pointer}
.tab.active{background:var(--bg3);border-color:var(--border2);color:var(--text)}
.lbl{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;margin-top:12px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none}
.inp:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;margin-top:16px}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.auth-err{font-size:12px;color:var(--red);background:#2d1515;border:1px solid #5c2222;border-radius:var(--rs);padding:8px 12px;margin-top:10px}

/* APP LAYOUT */
.app{display:flex;height:100%;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:18px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;font-family:'DM Mono',monospace}
.sb-info{flex:1;min-width:0}
.sb-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-handle{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.new-post-btn{margin:10px 14px;padding:9px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer}
.new-post-btn:hover{background:var(--accent2)}
.nav{padding:6px 0;flex:1}
.ni{display:flex;align-items:center;gap:9px;padding:8px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .1s;position:relative}
.ni:hover{background:var(--bg2);color:var(--text)}
.ni.active{background:var(--bg3);color:var(--text)}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.ni.active svg{opacity:1}
.nbadge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border)}
.so-btn{width:100%;padding:8px;background:none;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:12px;color:var(--text3);cursor:pointer}
.so-btn:hover{color:var(--red);border-color:var(--red)}

/* FEED */
.feed-col{flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:600px}
.feed-head{padding:16px 20px;border-bottom:1px solid var(--border);font-size:15px;font-weight:600;display:flex;align-items:center;gap:10px}
.feed-body{overflow-y:auto;flex:1;padding:0}

/* POST CARD */
.post-card{padding:16px 20px;border-bottom:1px solid var(--border);transition:background .1s}
.post-card:hover{background:var(--bg1)}
.post-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.post-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;cursor:pointer;font-family:'DM Mono',monospace}
.post-meta{flex:1}
.post-name{font-size:13px;font-weight:500;cursor:pointer}
.post-name:hover{color:var(--accent)}
.post-handle{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}
.post-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.post-content{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:12px;white-space:pre-wrap;word-break:break-word;cursor:pointer}
.post-actions{display:flex;gap:20px}
.pact{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);cursor:pointer;padding:4px 0;transition:color .1s;background:none;border:none;font-family:inherit}
.pact:hover{color:var(--text2)}
.pact.liked{color:var(--red)}
.pact.commented{color:var(--accent)}
.pact svg{width:14px;height:14px}
.pact-del{margin-left:auto;color:var(--text3)}
.pact-del:hover{color:var(--red)}

/* COMPOSE POST */
.compose-box{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px}
.compose-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;font-family:'DM Mono',monospace}
.compose-right{flex:1}
.compose-ta{width:100%;background:none;border:none;font-family:inherit;font-size:15px;color:var(--text);outline:none;resize:none;line-height:1.6;min-height:60px}
.compose-ta::placeholder{color:var(--text3)}
.compose-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.compose-counter{font-size:12px;color:var(--text3)}
.compose-counter.warn{color:var(--amber)}
.compose-counter.over{color:var(--red)}
.post-btn{padding:7px 18px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer}
.post-btn:hover{background:var(--accent2)}
.post-btn:disabled{opacity:.4;cursor:not-allowed}

/* RIGHT PANEL */
.right-col{width:280px;border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.right-section{padding:16px;border-bottom:1px solid var(--border)}
.right-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text2)}
.suggest-item{display:flex;align-items:center;gap:10px;padding:8px 0}
.sug-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;font-family:'DM Mono',monospace;cursor:pointer}
.sug-info{flex:1;min-width:0}
.sug-name{font-size:13px;font-weight:500;cursor:pointer}
.sug-name:hover{color:var(--accent)}
.sug-handle{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.follow-btn{padding:5px 12px;border-radius:20px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--accent);color:var(--accent);background:none}
.follow-btn:hover{background:var(--accent);color:#fff}
.follow-btn.following{border-color:var(--border2);color:var(--text2)}
.follow-btn.following:hover{border-color:var(--red);color:var(--red)}

/* PROFILE VIEW */
.profile-view{flex:1;overflow-y:auto}
.profile-header{padding:24px 20px;border-bottom:1px solid var(--border)}
.profile-top{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.profile-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:#fff;flex-shrink:0;font-family:'DM Mono',monospace}
.profile-names{flex:1}
.profile-dname{font-size:18px;font-weight:600}
.profile-handle{font-size:13px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:2px}
.profile-bio{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.profile-stats{display:flex;gap:20px}
.stat{text-align:center;cursor:pointer}
.stat-num{font-size:16px;font-weight:600}
.stat-lbl{font-size:12px;color:var(--text3)}
.profile-follow-btn{padding:8px 24px;border-radius:20px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--accent);color:var(--accent);background:none;margin-top:12px}
.profile-follow-btn:hover{background:var(--accent);color:#fff}
.profile-follow-btn.following{border-color:var(--border2);color:var(--text2)}
.profile-follow-btn.following:hover{border-color:var(--red);color:var(--red)}
.edit-profile-btn{padding:8px 24px;border-radius:20px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:none;margin-top:12px}
.edit-profile-btn:hover{border-color:var(--text);color:var(--text)}

/* COMMENTS */
.comments-section{padding:12px 20px;border-bottom:1px solid var(--border)}
.comment-item{display:flex;gap:8px;margin-bottom:10px}
.comment-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0;font-family:'DM Mono',monospace}
.comment-body{flex:1}
.comment-name{font-size:12px;font-weight:500;color:var(--text2)}
.comment-text{font-size:13px;color:var(--text);line-height:1.5}
.comment-input-row{display:flex;gap:8px;margin-top:8px}
.comment-inp{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-family:inherit;font-size:13px;color:var(--text);outline:none}
.comment-inp:focus{border-color:var(--accent)}
.comment-inp::placeholder{color:var(--text3)}
.comment-send{padding:7px 14px;background:var(--accent);border:none;border-radius:20px;font-family:inherit;font-size:12px;color:#fff;cursor:pointer}
.comment-send:hover{background:var(--accent2)}

/* NOTIFS */
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)}
.notif-item.unread{background:var(--bg1)}
.notif-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* SEARCH */
.search-bar{padding:12px 16px;border-bottom:1px solid var(--border)}
.search-inp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-family:inherit;font-size:13px;color:var(--text);outline:none}
.search-inp:focus{border-color:var(--accent)}
.search-inp::placeholder{color:var(--text3)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r);width:480px;max-width:100%;overflow:hidden}
.modal-head{padding:14px 16px;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-title{font-size:14px;font-weight:600}
.modal-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1}
.modal-x:hover{color:var(--text)}
.modal-body{padding:16px}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:9px 18px;font-size:13px;color:var(--text);z-index:300;animation:sup .2s ease;white-space:nowrap;pointer-events:none}
@keyframes sup{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.empty-state{padding:40px 20px;text-align:center;color:var(--text3);font-size:14px}
.empty-state .big{font-size:32px;margin-bottom:8px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════
//  PASTE YOUR SUPABASE KEYS HERE
// ═══════════════════════════════════════════
const SUPABASE_URL  = 'https://YOUR_PROJECT_ID.supabase.co';
const SUPABASE_ANON = 'YOUR_ANON_PUBLIC_KEY';
// ═══════════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const COLORS = ['#5b7fff','#3ecf8e','#f46b6b','#f5a623','#a78bfa','#38bdf8','#fb7185','#34d399'];
function colorFor(str){ let h=0; for(let c of (str||'?'))h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function initials(str){ return (str||'?').slice(0,2).toUpperCase(); }
function timeAgo(ts){
  const s=Math.floor((Date.now()-new Date(ts))/1000);
  if(s<60)return s+'s'; if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
}

const mk=(tag,cls,...kids)=>{ const d=document.createElement(tag); if(cls)d.className=cls; kids.forEach(k=>d.appendChild(typeof k==='string'?document.createTextNode(k):k)); return d; };
const qs=s=>document.querySelector(s);
let toastTimer;
function toast(msg){ const old=qs('.toast');if(old)old.remove();clearTimeout(toastTimer); const t=mk('div','toast',msg);document.body.appendChild(t);toastTimer=setTimeout(()=>t.remove(),2600); }

// STATE
let S={
  user:null, profile:null,
  page:'feed', // feed | notifications | search | profile
  posts:[], allProfiles:[], follows:[],
  notifications:[], likes:new Set(),
  openPostId:null, viewUserId:null,
  loading:true, editModal:false,
  searchQ:'', searchResults:[],
};
let channels=[];

function render(){
  const root=qs('#root'); root.innerHTML='';
  if(S.loading){root.appendChild(renderLoading());return;}
  if(!S.user){root.appendChild(renderAuth());return;}
  root.appendChild(renderApp());
}

function renderLoading(){
  const w=mk('div','loading');
  w.appendChild(mk('div','spinner'));
  w.appendChild(mk('span','','Loading...'));
  return w;
}

// ══════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════
function renderAuth(){
  let tab='login', user='', pass='', pass2='', dispName='';
  const screen=mk('div','auth-screen');
  const card=mk('div','auth-card');
  screen.appendChild(card);
  const msgDiv=mk('div','');
  card.appendChild(msgDiv);
  function showErr(m){msgDiv.innerHTML='';msgDiv.appendChild(mk('div','auth-err',m));}
  function clearMsg(){msgDiv.innerHTML='';}

  function build(){
    Array.from(card.children).forEach(c=>{if(c!==msgDiv)c.remove();}); clearMsg();

    const logo=mk('div','logo','social'); logo.appendChild(mk('span','','box'));
    card.insertBefore(logo,msgDiv);
    card.insertBefore(mk('div','auth-sub','Share moments with the world.'),msgDiv);

    const tabs=mk('div','tabs');
    ['login','create'].forEach(t=>{
      const b=mk('button','tab'+(tab===t?' active':''),t==='login'?'Sign in':'Join');
      b.onclick=()=>{tab=t;build();};
      tabs.appendChild(b);
    });
    card.appendChild(tabs);

    // Facebook button
    const fbBtn=mk('button','');
    fbBtn.style.cssText='width:100%;padding:11px;background:#1877f2;border:none;border-radius:var(--rs);font-family:inherit;font-size:14px;font-weight:500;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .15s';
    fbBtn.onmouseover=()=>fbBtn.style.opacity='.85';
    fbBtn.onmouseout=()=>fbBtn.style.opacity='1';
    fbBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>Continue with Facebook`;
    fbBtn.onclick=async()=>{
      fbBtn.disabled=true; fbBtn.textContent='Connecting...';
      const {error}=await sb.auth.signInWithOAuth({provider:'facebook',options:{redirectTo:window.location.href}});
      if(error){showErr(error.message);fbBtn.disabled=false;fbBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>Continue with Facebook`;}
    };
    card.appendChild(fbBtn);

    // divider
    const divRow=mk('div','');
    divRow.style.cssText='display:flex;align-items:center;gap:10px;margin:14px 0';
    const l1=mk('div','');l1.style.cssText='flex:1;height:1px;background:var(--border)';
    const l2=mk('div','');l2.style.cssText='flex:1;height:1px;background:var(--border)';
    const orTxt=mk('span','');orTxt.style.cssText='font-size:12px;color:var(--text3);white-space:nowrap';
    orTxt.textContent='or use email';
    divRow.appendChild(l1);divRow.appendChild(orTxt);divRow.appendChild(l2);
    card.appendChild(divRow);

    // email form
    if(tab==='create'){
      card.appendChild(mk('label','lbl','Display name'));
      const di=mk('input','inp');di.placeholder='Your Name';di.value=dispName;di.oninput=e=>dispName=e.target.value;card.appendChild(di);
    }
    card.appendChild(mk('label','lbl','Username'));
    const ui=mk('input','inp');ui.placeholder='yourname';ui.value=user;ui.autocomplete='username';
    ui.oninput=e=>user=e.target.value;card.appendChild(ui);

    card.appendChild(mk('label','lbl','Password'));
    const pi=mk('input','inp');pi.type='password';pi.placeholder='Password';pi.value=pass;
    pi.oninput=e=>pass=e.target.value;card.appendChild(pi);

    if(tab==='create'){
      card.appendChild(mk('label','lbl','Confirm password'));
      const pi2=mk('input','inp');pi2.type='password';pi2.placeholder='Repeat password';pi2.value=pass2;
      pi2.oninput=e=>pass2=e.target.value;card.appendChild(pi2);
    }

    const btn=mk('button','btn-primary',tab==='login'?'Sign in →':'Create account →');
    btn.onclick=async()=>{
      clearMsg();
      if(!user.trim()){showErr('Enter a username.');return;}
      if(!pass){showErr('Enter a password.');return;}
      if(tab==='create'&&pass!==pass2){showErr('Passwords do not match.');return;}
      btn.disabled=true;btn.textContent='Please wait...';
      const proj=SUPABASE_URL.replace('https://','').replace('http://','');
      const email=user.trim().toLowerCase().replace(/[^a-z0-9]/g,'')+'@'+proj;
      try{
        if(tab==='login'){
          const {error}=await sb.auth.signInWithPassword({email,password:pass});
          if(error)throw error;
        } else {
          const {data:ex}=await sb.from('profiles').select('id').eq('username',user.trim()).maybeSingle();
          if(ex){showErr('Username taken.');btn.disabled=false;btn.textContent='Create account →';return;}
          const {data,error}=await sb.auth.signUp({email,password:pass});
          if(error)throw error;
          if(data?.user){
            await sb.from('profiles').update({username:user.trim(),display_name:dispName||user.trim(),avatar_color:colorFor(user.trim())}).eq('id',data.user.id);
          }
        }
      } catch(e){showErr(e.message||'Something went wrong.');btn.disabled=false;btn.textContent=tab==='login'?'Sign in →':'Create account →';}
    };
    card.appendChild(btn);
    ui.focus();
  }
  build();
  return screen;
}


// ══════════════════════════════════════════
//  APP
// ══════════════════════════════════════════
function renderApp(){
  const app=mk('div','app');
  app.appendChild(renderSidebar());

  if(S.page==='feed')        app.appendChild(renderFeedCol());
  else if(S.page==='notifications') app.appendChild(renderNotifsCol());
  else if(S.page==='search') app.appendChild(renderSearchCol());
  else if(S.page==='profile'){ app.appendChild(renderProfileCol(S.viewUserId||S.profile?.id)); }

  if(S.page==='feed') app.appendChild(renderRightCol());
  if(S.editModal)     app.appendChild(renderEditModal());

  return app;
}

function renderPost(post, showComments=false){
  const prof=S.allProfiles.find(p=>p.id===post.user_id)||{username:'unknown',display_name:'Unknown',avatar_color:'#888'};
  const card=mk('div','post-card');

  const top=mk('div','post-top');
  const av=mk('div','post-av',initials(prof.display_name||prof.username));
  av.style.background=prof.avatar_color||'#5b7fff';
  av.onclick=()=>goProfile(prof.id);
  const meta=mk('div','post-meta');
  const nameEl=mk('div','post-name',prof.display_name||prof.username);
  nameEl.onclick=()=>goProfile(prof.id);
  const handleEl=mk('div','post-handle','@'+prof.username+' · '+timeAgo(post.created_at));
  meta.appendChild(nameEl); meta.appendChild(handleEl);
  top.appendChild(av); top.appendChild(meta);
  card.appendChild(top);

  const content=mk('div','post-content',post.content);
  content.onclick=()=>toggleComments(post.id);
  card.appendChild(content);

  // actions
  const acts=mk('div','post-actions');
  const likeCount=(S.posts.find(p=>p.id===post.id)||{}).like_count||post.like_count||0;
  const isLiked=S.likes.has(post.id);
  const likeBtn=mk('button','pact'+(isLiked?' liked':''));
  likeBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${likeCount}`;
  likeBtn.onclick=async(e)=>{e.stopPropagation();await toggleLike(post);};
  acts.appendChild(likeBtn);

  const commentCount=post.comment_count||0;
  const commentBtn=mk('button','pact');
  commentBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ${commentCount}`;
  commentBtn.onclick=()=>toggleComments(post.id);
  acts.appendChild(commentBtn);

  if(post.user_id===S.profile?.id){
    const delBtn=mk('button','pact pact-del');
    delBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>`;
    delBtn.onclick=async(e)=>{e.stopPropagation();await deletePost(post.id);};
    acts.appendChild(delBtn);
  }
  card.appendChild(acts);

  // comments section
  if(S.openPostId===post.id){
    card.appendChild(renderCommentsSection(post));
  }

  return card;
}

function renderCommentsSection(post){
  const sec=mk('div','comments-section');
  const postComments=(post.comments||[]);
  postComments.forEach(c=>{
    const prof=S.allProfiles.find(p=>p.id===c.user_id)||{username:'?',avatar_color:'#888',display_name:'?'};
    const item=mk('div','comment-item');
    const av=mk('div','comment-av',initials(prof.display_name||prof.username));
    av.style.background=prof.avatar_color;
    const body2=mk('div','comment-body');
    body2.appendChild(mk('span','comment-name','@'+prof.username+' '));
    body2.appendChild(mk('span','comment-text',c.content));
    item.appendChild(av);item.appendChild(body2);
    sec.appendChild(item);
  });
  const row=mk('div','comment-input-row');
  const ci=mk('input','comment-inp');
  ci.placeholder='Add a comment...';
  const cs=mk('button','comment-send','Send');
  cs.onclick=async()=>{
    const text=ci.value.trim();
    if(!text)return;
    cs.disabled=true;
    await sb.from('comments').insert({post_id:post.id,user_id:S.user.id,content:text});
    if(post.user_id!==S.user.id){
      await sb.from('notifications').insert({user_id:post.user_id,from_id:S.user.id,type:'comment',post_id:post.id});
    }
    ci.value='';cs.disabled=false;
    await loadPosts();render();
  };
  ci.onkeydown=e=>e.key==='Enter'&&cs.click();
  row.appendChild(ci);row.appendChild(cs);
  sec.appendChild(row);
  return sec;
}

// ══════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════
function goProfile(userId){
  S.page='profile';S.viewUserId=userId;render();
}

function toggleComments(postId){
  S.openPostId=S.openPostId===postId?null:postId;render();
}

async function toggleLike(post){
  const isLiked=S.likes.has(post.id);
  if(isLiked){
    await sb.from('likes').delete().eq('user_id',S.user.id).eq('post_id',post.id);
    S.likes.delete(post.id);
    const p=S.posts.find(p=>p.id===post.id);if(p)p.like_count=Math.max(0,(p.like_count||1)-1);
  } else {
    await sb.from('likes').insert({user_id:S.user.id,post_id:post.id});
    S.likes.add(post.id);
    const p=S.posts.find(p=>p.id===post.id);if(p)p.like_count=(p.like_count||0)+1;
    if(post.user_id!==S.user.id){
      await sb.from('notifications').insert({user_id:post.user_id,from_id:S.user.id,type:'like',post_id:post.id});
    }
  }
  render();
}

async function toggleFollow(userId){
  const myFollowing=new Set(S.follows.filter(f=>f.follower_id===S.profile?.id).map(f=>f.following_id));
  if(myFollowing.has(userId)){
    await sb.from('follows').delete().eq('follower_id',S.user.id).eq('following_id',userId);
    S.follows=S.follows.filter(f=>!(f.follower_id===S.user.id&&f.following_id===userId));
  } else {
    await sb.from('follows').insert({follower_id:S.user.id,following_id:userId});
    S.follows.push({follower_id:S.user.id,following_id:userId});
    await sb.from('notifications').insert({user_id:userId,from_id:S.user.id,type:'follow'});
  }
}

async function deletePost(postId){
  await sb.from('posts').delete().eq('id',postId);
  S.posts=S.posts.filter(p=>p.id!==postId);
  render();
}

//  DATA
// ══════════════════════════════════════════
async function loadAll(){
  const [postsRes,profilesRes,followsRes,likesRes,notifsRes]=await Promise.all([
    sb.from('posts').select('*').order('created_at',{ascending:false}).limit(100),
    sb.from('profiles').select('*'),
    sb.from('follows').select('*'),
    sb.from('likes').select('post_id').eq('user_id',S.user.id),
    sb.from('notifications').select('*').eq('user_id',S.user.id).order('created_at',{ascending:false}).limit(50),
  ]);
  S.posts=postsRes.data||[];
  S.allProfiles=profilesRes.data||[];
  S.follows=followsRes.data||[];
  S.likes=new Set((likesRes.data||[]).map(l=>l.post_id));
  S.notifications=notifsRes.data||[];

  // load comments for open post
  if(S.openPostId){
    const {data}=await sb.from('comments').select('*').eq('post_id',S.openPostId).order('created_at');
    const post=S.posts.find(p=>p.id===S.openPostId);
    if(post)post.comments=data||[];
  }

  // attach like_counts
  const {data:lc}=await sb.from('likes').select('post_id');
  const counts={};
  (lc||[]).forEach(l=>{counts[l.post_id]=(counts[l.post_id]||0)+1;});
  S.posts.forEach(p=>{p.like_count=counts[p.id]||0;});

  // attach comment counts
  const {data:cc}=await sb.from('comments').select('post_id');
  const ccounts={};
  (cc||[]).forEach(c=>{ccounts[c.post_id]=(ccounts[c.post_id]||0)+1;});
  S.posts.forEach(p=>{p.comment_count=ccounts[p.id]||0;});
}

async function loadPosts(){
  const {data}=await sb.from('posts').select('*').order('created_at',{ascending:false}).limit(100);
  S.posts=data||[];
  const {data:lc}=await sb.from('likes').select('post_id');
  const counts={};(lc||[]).forEach(l=>{counts[l.post_id]=(counts[l.post_id]||0)+1;});
  S.posts.forEach(p=>{p.like_count=counts[p.id]||0;});
  const {data:cc}=await sb.from('comments').select('post_id');
  const ccounts={};(cc||[]).forEach(c=>{ccounts[c.post_id]=(ccounts[c.post_id]||0)+1;});
  S.posts.forEach(p=>{p.comment_count=ccounts[p.id]||0;});
}

function setupRealtime(){
  channels.forEach(c=>sb.removeChannel(c));channels=[];
  const ch=sb.channel('socialbox')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},async p=>{
      S.posts.unshift(p.new);p.new.like_count=0;p.new.comment_count=0;
      if(p.new.user_id!==S.user.id){
        const prof=S.allProfiles.find(pr=>pr.id===p.new.user_id);
        if(prof)toast('📝 @'+prof.username+' posted');
      }
      render();
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'posts'},p=>{
      S.posts=S.posts.filter(po=>po.id!==p.old.id);render();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:'user_id=eq.'+S.user.id},p=>{
      S.notifications.unshift(p.new);render();
    })
    .subscribe();
  channels.push(ch);
}

// ══════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    S.user=session.user;
    await sb.from('profiles').select('*').eq('id',S.user.id).single().then(({data})=>S.profile=data);
    await loadAll();
    setupRealtime();
  }
  S.loading=false;render();

  sb.auth.onAuthStateChange(async(_,session)=>{
    if(session){
      S.user=session.user;S.loading=true;render();
      await sb.from('profiles').select('*').eq('id',S.user.id).single().then(({data})=>S.profile=data);
      await loadAll();setupRealtime();S.loading=false;
    } else {
      S.user=null;S.profile=null;S.posts=[];S.allProfiles=[];S.follows=[];S.likes=new Set();S.notifications=[];
      channels.forEach(c=>sb.removeChannel(c));channels=[];
    }
    render();
  });
}
init();
</script>
