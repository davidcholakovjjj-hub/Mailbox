    mi.appendChild(mk('div',{class:'rp-name',text:S.profile.display_name||S.profile.username}));
    mi.appendChild(mk('div',{class:'rp-sub',text:'@'+S.profile.username}));
    me.appendChild(mi);
    scroll.appendChild(me);
    scroll.appendChild(mk('div',{class:'rp-divider'}));
  }
  const myF=new Set(S.follows.filter(f=>f.follower_id===S.profile?.id).map(f=>f.following_id));
  const sugg=S.profiles.filter(p=>p.id!==S.profile?.id&&!myF.has(p.id)).slice(0,6);
  if(sugg.length>0){
    const sec=mk('div',{class:'rp-section'});
    sec.appendChild(mk('div',{class:'rp-title',text:'Suggested for you'}));
    sugg.forEach(p=>{
      const row=mk('div',{class:'rp-user-row'});
      const av=buildAv(p,38,'rp-av');av.style.cursor='pointer';av.onclick=()=>goProfile(p.id);
      const info=mk('div',{class:'rp-info'});
      const nm=mk('div',{class:'rp-name',text:p.display_name||p.username});nm.onclick=()=>goProfile(p.id);
      const foll=S.follows.filter(f=>f.following_id===p.id).length;
      info.appendChild(nm);info.appendChild(mk('div',{class:'rp-sub',text:foll>0?fmtCount(foll)+' followers':'New to socialbox'}));
      const fb=mk('button',{class:'rp-follow-btn',text:'Follow'});
      fb.onclick=async()=>{await handleFollow(p.id);fb.textContent='Following';fb.className='rp-follow-btn following';};
      row.appendChild(av);row.appendChild(info);row.appendChild(fb);sec.appendChild(row);
    });
    scroll.appendChild(sec);
  }
  const sec2=mk('div',{class:'rp-section'});
  sec2.appendChild(mk('div',{class:'rp-title',text:'Trending'}));
  ['#photography','#reels','#art','#fashion','#travel','#food'].forEach(tag=>{
    const row=mk('div',{class:'rp-trending-tag'});
    row.appendChild(mk('span',{class:'rp-tag-name',text:tag}));
    row.appendChild(mk('span',{class:'rp-tag-count',text:Math.floor(Math.random()*900+100)+'K posts'}));
    row.onclick=()=>{S.searchQ=tag;S.page='explore';doSearch(tag);render();};
    sec2.appendChild(row);
  });
  scroll.appendChild(sec2);
  scroll.appendChild(mk('div',{class:'rp-divider'}));
  const fl=mk('div',{class:'rp-footer-links'});
  ['About','Help','Privacy','Terms'].forEach(l=>fl.appendChild(mk('span',{class:'rp-footer-link',text:l})));
  scroll.appendChild(fl);
  panel.appendChild(scroll);return panel;
}

// ═══════════════════════════════════════════════════════════════════════
//  EXPLORE
// ═══════════════════════════════════════════════════════════════════════
function renderExploreView(){
  const view=mk('div',{class:'explore-view',style:'flex:1'});
  const sw=mk('div',{class:'explore-search-wrap'});
  const sb2=mk('div',{class:'explore-search-box'});
  const icon=mkSvg('<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>');
  icon.setAttribute('class','explore-search-icon');
  const inp=mk('input',{class:'explore-search-inp',placeholder:'Search users, hashtags...',type:'search',value:S.searchQ});
  inp.oninput=e=>{S.searchQ=e.target.value;if(S.searchQ.length>1)doSearch(S.searchQ);else{S.searchRes={users:[],tags:[]};render();}};
  sb2.appendChild(icon);sb2.appendChild(inp);
  if(S.searchQ){
    const cl=mk('button',{class:'explore-search-clear',text:'×'});
    cl.onclick=()=>{S.searchQ='';S.searchRes={users:[],tags:[]};render();};
    sb2.appendChild(cl);
  }
  sw.appendChild(sb2);view.appendChild(sw);

  if(S.searchQ&&(S.searchRes.users.length>0||S.searchRes.tags.length>0)){
    if(S.searchRes.users.length>0){
      view.appendChild(mk('div',{class:'explore-results-section',text:'People'}));
      S.searchRes.users.forEach(p=>{
        const row=mk('div',{class:'explore-user-result',onclick:()=>goProfile(p.id)});
        const av=buildAv(p,48,'explore-res-av');av.onclick=e=>{e.stopPropagation();goProfile(p.id);};
        const info=mk('div',{class:'explore-res-info'});
        info.appendChild(mk('div',{class:'explore-res-name',text:p.display_name||p.username}));
        info.appendChild(mk('div',{class:'explore-res-handle',text:'@'+p.username}));
        if(p.bio)info.appendChild(mk('div',{class:'explore-res-bio',text:p.bio.slice(0,60)}));
        row.appendChild(av);row.appendChild(info);
        const myF=new Set(S.follows.filter(f=>f.follower_id===S.profile?.id).map(f=>f.following_id));
        if(p.id!==S.profile?.id){
          const isF=myF.has(p.id);
          const fb=mk('button',{class:'explore-res-follow-btn'+(isF?' following':''),text:isF?'Following':'Follow'});
          fb.onclick=async e2=>{e2.stopPropagation();await handleFollow(p.id);render();};
          row.appendChild(fb);
        }
        view.appendChild(row);
      });
    }
  } else if(!S.searchQ){
    const cats=mk('div',{class:'explore-categories'});
    ['All','Photos','Videos','Reels','People'].forEach(c=>{
      const b=mk('button',{class:'explore-cat-btn'+(S.exploreCategory===(c.toLowerCase())?' active':''),text:c});
      b.onclick=()=>{S.exploreCategory=c.toLowerCase();render();};cats.appendChild(b);
    });
    view.appendChild(cats);
    const grid=mk('div',{class:'explore-grid'});
    const all=[...S.posts,...S.reels].sort(()=>Math.random()-.5).slice(0,30);
    if(all.length===0){
      const emp=mk('div',{class:'empty-state',style:'grid-column:1/-1;padding:48px 16px'});
      emp.innerHTML=`<span class="empty-state-icon">🔍</span><div class="empty-state-title">Nothing to explore yet</div>`;
      grid.appendChild(emp);
    } else {
      all.forEach(item=>{
        const mediaUrl=item.media_url||item.video_url;
        const isVid=item.media_type==='video'||!!item.video_url;
        const cell=mk('div',{class:'explore-grid-item'});
        if(mediaUrl){
          if(isVid){const v=document.createElement('video');v.src=mediaUrl;v.className='explore-grid-img';v.muted=true;v.preload='metadata';cell.appendChild(v);cell.appendChild(mk('div',{class:'explore-grid-video-badge',html:'▶'}));}
          else{const i=document.createElement('img');i.src=mediaUrl;i.className='explore-grid-img';i.loading='lazy';cell.appendChild(i);}
        } else {cell.style.cssText+=';display:flex;align-items:center;justify-content:center;padding:8px;font-size:11px;color:var(--text2)';cell.textContent=(item.content||'').slice(0,60);}
        const ov=mk('div',{class:'explore-grid-overlay'});
        ov.innerHTML=`<span class="explore-grid-stat">❤ ${fmtCount(item.like_count||0)}</span><span class="explore-grid-stat">💬 ${fmtCount(item.comment_count||0)}</span>`;
        cell.appendChild(ov);
        cell.onclick=()=>{if(mediaUrl&&!isVid){S.lightbox={url:mediaUrl,type:'image'};render();}};
        grid.appendChild(cell);
      });
    }
    view.appendChild(grid);
  }
  return view;
}

async function doSearch(q){
  const {data:users}=await sb.from('profiles').select('*').or(`username.ilike.%${q}%,display_name.ilike.%${q}%`).limit(10);
  if(q!==S.searchQ)return;
  S.searchRes={users:users||[],tags:[]};render();
}

// ═══════════════════════════════════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════════════
function renderNotifsView(){
  const view=mk('div',{class:'notifs-view',style:'flex:1'});
  const today=S.notifs.filter(n=>(Date.now()-new Date(n.created_at))/86400000<1);
  const earlier=S.notifs.filter(n=>(Date.now()-new Date(n.created_at))/86400000>=1);
  if(today.length>0){view.appendChild(mk('div',{class:'notif-section-header',text:'Today'}));today.forEach((n,i)=>{const el=renderNotifItem(n);el.style.animationDelay=i*.04+'s';view.appendChild(el);});}
  if(earlier.length>0){view.appendChild(mk('div',{class:'notif-section-header',text:'Earlier'}));earlier.forEach((n,i)=>{const el=renderNotifItem(n);el.style.animationDelay=i*.04+'s';view.appendChild(el);});}
  if(S.notifs.length===0){
    const emp=mk('div',{class:'empty-state',style:'padding:60px 24px'});
    emp.innerHTML=`<span class="empty-state-icon">🔔</span><div class="empty-state-title">No notifications</div><div class="empty-state-sub">When people like or comment on your posts, you'll see it here.</div>`;
    view.appendChild(emp);
  }
  return view;
}

function renderNotifItem(n){
  const prof=S.profiles.find(p=>p.id===n.from_id)||{username:'someone',avatar_color:'#888'};
  const item=mk('div',{class:'notif-item'+(n.is_read?'':' unread')});
  item.onclick=async()=>{
    if(!n.is_read){await sb.from('notifications').update({is_read:true}).eq('id',n.id);n.is_read=true;render();}
    if(n.from_id)goProfile(n.from_id);
  };
  const avWrap=mk('div',{class:'notif-av',style:'position:relative'});
  avWrap.appendChild(buildAv(prof,44,''));
  const typeIcons={like:'❤️',comment:'💬',follow:'👤',reel:'🎬',mention:'@'};
  const typeClasses={like:'like',comment:'comment',follow:'follow',reel:'reel',mention:'mention'};
  const ti=mk('div',{class:'notif-type-icon '+(typeClasses[n.type]||'like'),text:typeIcons[n.type]||'❤️'});
  avWrap.appendChild(ti);
  item.appendChild(avWrap);
  const body=mk('div',{class:'notif-body'});
  const msgs={like:'liked your post',comment:'commented on your post',follow:'started following you',reel:'liked your reel',mention:'mentioned you in a comment'};
  const txt=mk('div',{class:'notif-text'});
  const strong=mk('strong',{text:'@'+(prof.username||'someone')});strong.style.cursor='pointer';strong.onclick=e=>{e.stopPropagation();goProfile(prof.id);};
  txt.appendChild(strong);
  txt.appendChild(document.createTextNode(' '+(msgs[n.type]||'interacted with your content')));
  body.appendChild(txt);
  body.appendChild(mk('div',{class:'notif-time',text:timeAgo(n.created_at)}));
  item.appendChild(body);
  if(!n.is_read)item.appendChild(mk('div',{class:'notif-unread-dot'}));
  return item;
}

async function markAllRead(){
  const unread=S.notifs.filter(n=>!n.is_read);
  if(unread.length===0)return;
  await sb.from('notifications').update({is_read:true}).eq('user_id',S.user.id).eq('is_read',false);
  S.notifs.forEach(n=>n.is_read=true);
}

// ═══════════════════════════════════════════════════════════════════════
//  PROFILE
// ═══════════════════════════════════════════════════════════════════════
function renderProfileView(userId){
  const view=mk('div',{class:'profile-view',style:'flex:1'});
  const prof=S.profiles.find(p=>p.id===userId)||S.profile;
  if(!prof){view.appendChild(mk('div',{class:'empty-state',text:'User not found'}));return view;}

  const hd=mk('div',{class:'profile-header'});
  const top=mk('div',{class:'profile-top'});
  const avWrap=mk('div',{class:'profile-av-wrap'});
  const bigAv=buildAv(prof,80,'profile-av');
  avWrap.appendChild(bigAv);
  top.appendChild(avWrap);
  const info=mk('div',{class:'profile-info'});
  info.appendChild(mk('div',{class:'profile-dname',text:prof.display_name||prof.username}));
  info.appendChild(mk('div',{class:'profile-handle',text:'@'+prof.username}));
  if(prof.bio)info.appendChild(mk('div',{class:'profile-bio',text:prof.bio}));
  top.appendChild(info);
  hd.appendChild(top);

  const userPosts=S.posts.filter(p=>p.user_id===userId);
  const userReels=S.reels.filter(r=>r.user_id===userId);
  const followers=S.follows.filter(f=>f.following_id===userId).length;
  const following=S.follows.filter(f=>f.follower_id===userId).length;

  const stats=mk('div',{class:'profile-stats'});
  [[userPosts.length,'Posts'],[userReels.length,'Reels'],[followers,'Followers'],[following,'Following']].forEach(([n,l])=>{
    const st=mk('div',{class:'profile-stat'});
    if(l==='Followers'||l==='Following'){
      st.onclick=()=>{S.followModal={type:l.toLowerCase(),userId};render();};
    }
    st.appendChild(mk('div',{class:'profile-stat-num',text:fmtCount(Number(n))}));
    st.appendChild(mk('div',{class:'profile-stat-lbl',text:l}));
    stats.appendChild(st);
  });
  hd.appendChild(stats);

  const acts=mk('div',{class:'profile-actions'});
  if(userId===S.profile?.id){
    const eb=mk('button',{class:'profile-btn profile-btn-outline',text:'Edit profile'});
    eb.onclick=()=>{S.editOpen=true;render();};
    acts.appendChild(eb);
    const share=mk('button',{class:'profile-btn profile-btn-outline'});
    share.innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Share`;
    share.onclick=()=>{if(navigator.clipboard)navigator.clipboard.writeText(window.location.origin+'?u='+S.profile.username);toast('Profile link copied!','success');};
    acts.appendChild(share);
  } else {
    const myF=new Set(S.follows.filter(f=>f.follower_id===S.profile?.id).map(f=>f.following_id));
    const isF=myF.has(userId);
    const fb=mk('button',{class:'profile-btn profile-btn-follow'+(isF?' following':''),text:isF?'Following':'Follow'});
    fb.onclick=async()=>{await handleFollow(userId);render();};
    acts.appendChild(fb);
    const msg=mk('button',{class:'profile-btn profile-btn-msg',text:'Message'});
    msg.onclick=()=>{S.page='messages';S.activeDm=userId;render();};
    acts.appendChild(msg);
  }
  hd.appendChild(acts);
  view.appendChild(hd);

  // Tabs
  let activeTab='posts';
  const tabs=mk('div',{class:'profile-tabs'});
  const tabContent=mk('div',{});
  const renderTabContent=()=>{
    tabContent.innerHTML='';
    if(activeTab==='posts'){
      if(userPosts.length===0){
        const emp=mk('div',{class:'profile-empty'});
        emp.innerHTML=`<div class="profile-empty-icon">📷</div><div class="profile-empty-title">No posts yet</div>`;
        tabContent.appendChild(emp);
      } else {
        const grid=mk('div',{class:'profile-grid'});
        [...userPosts].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(post=>{
          const cell=mk('div',{class:'profile-grid-item'});
          if(post.media_url){
            if(post.media_type==='video'){const v=document.createElement('video');v.src=post.media_url;v.className='profile-grid-video';v.muted=true;v.preload='metadata';cell.appendChild(v);cell.appendChild(mk('div',{class:'profile-grid-video-badge',html:'▶'}));}
            else{const i=document.createElement('img');i.src=post.media_url;i.className='profile-grid-img';i.loading='lazy';cell.appendChild(i);}
          } else {cell.className+=' grid-text-post';cell.style.cssText+=';display:flex;align-items:center;justify-content:center;padding:8px;font-size:11px;color:var(--text2)';cell.textContent=(post.content||'').slice(0,60);}
          const ov=mk('div',{class:'profile-grid-overlay'});
          ov.innerHTML=`<span class="profile-grid-stat">❤ ${fmtCount(post.like_count||0)}</span><span class="profile-grid-stat">💬 ${fmtCount(post.comment_count||0)}</span>`;
          cell.appendChild(ov);
          cell.onclick=()=>{if(post.media_url)S.lightbox={url:post.media_url,type:post.media_type==='video'?'video':'image'};else openComments(post.id);render();};
          grid.appendChild(cell);
        });
        tabContent.appendChild(grid);
      }
    } else {
      if(userReels.length===0){
        const emp=mk('div',{class:'profile-empty'});
        emp.innerHTML=`<div class="profile-empty-icon">🎬</div><div class="profile-empty-title">No reels yet</div>`;
        tabContent.appendChild(emp);
      } else {
        const grid=mk('div',{class:'profile-reels-grid'});
        [...userReels].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(reel=>{
          const cell=mk('div',{class:'profile-reel-item'});
          if(reel.video_url){const v=document.createElement('video');v.src=reel.video_url;v.className='profile-reel-video';v.muted=true;v.preload='metadata';cell.appendChild(v);}
          const ov=mk('div',{class:'profile-grid-overlay'});
          ov.innerHTML=`<span class="profile-grid-stat">❤ ${fmtCount(reel.like_count||0)}</span><span class="profile-grid-stat">💬 ${fmtCount(reel.comment_count||0)}</span>`;
          cell.appendChild(ov);
          cell.onclick=()=>{S.sub='reels';S.page='feed';render();};
          grid.appendChild(cell);
        });
        tabContent.appendChild(grid);
      }
    }
  };

  [{key:'posts',icon:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',label:'Posts'},
   {key:'reels',icon:'<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>',label:'Reels'}]
  .forEach(t=>{
    const tab=mk('div',{class:'profile-tab'+(activeTab===t.key?' active':'')});
    tab.appendChild(mkSvg(t.icon));
    tab.onclick=()=>{activeTab=t.key;qsa('.profile-tab').forEach(x=>x.classList.remove('active'));tab.classList.add('active');renderTabContent();};
    tabs.appendChild(tab);
  });
  view.appendChild(tabs);
  renderTabContent();
  view.appendChild(tabContent);
  return view;
}

// ═══════════════════════════════════════════════════════════════════════
//  FOLLOW MODAL
// ═══════════════════════════════════════════════════════════════════════
function renderFollowModal(){
  const {type,userId}=S.followModal;
  const overlay=mk('div',{class:'follow-modal-overlay'});
  overlay.onclick=e=>{if(e.target===overlay){S.followModal=null;render();}};
  const modal=mk('div',{class:'follow-modal'});
  const hd=mk('div',{class:'follow-modal-header'});
  hd.appendChild(mk('span',{class:'follow-modal-title',text:type==='followers'?'Followers':'Following'}));
  const x=mk('button',{class:'follow-modal-close',text:'×',onclick:()=>{S.followModal=null;render();}});
  hd.appendChild(x);modal.appendChild(hd);
  const list=mk('div',{class:'follow-modal-list'});
  const ids=type==='followers'
    ?S.follows.filter(f=>f.following_id===userId).map(f=>f.follower_id)
    :S.follows.filter(f=>f.follower_id===userId).map(f=>f.following_id);
  const profs=ids.map(id=>S.profiles.find(p=>p.id===id)).filter(Boolean);
  const myF=new Set(S.follows.filter(f=>f.follower_id===S.profile?.id).map(f=>f.following_id));
  profs.forEach(p=>{
    const row=mk('div',{class:'follow-modal-item'});
    const av=buildAv(p,40,'fm-av');av.style.cursor='pointer';av.onclick=()=>{S.followModal=null;goProfile(p.id);};
    const info=mk('div',{class:'fm-info'});
    const nm=mk('div',{class:'fm-name',text:p.display_name||p.username});nm.onclick=()=>{S.followModal=null;goProfile(p.id);};
    info.appendChild(nm);info.appendChild(mk('div',{class:'fm-handle',text:'@'+p.username}));
    row.appendChild(av);row.appendChild(info);
    if(p.id!==S.profile?.id){
      const isF=myF.has(p.id);
      const fb=mk('button',{class:'fm-follow-btn'+(isF?' following':''),text:isF?'Following':'Follow'});
      fb.onclick=async()=>{await handleFollow(p.id);render();};
      row.appendChild(fb);
    }
    list.appendChild(row);
  });
  if(profs.length===0){list.appendChild(mk('div',{class:'empty-state',style:'padding:32px',text:'Nobody here yet'}));}
  modal.appendChild(list);overlay.appendChild(modal);return overlay;
}

// ═══════════════════════════════════════════════════════════════════════
//  EDIT PROFILE
// ═══════════════════════════════════════════════════════════════════════
function renderEditProfile(){
  let dname=S.profile?.display_name||'';
  let bio=S.profile?.bio||'';
  let username=S.profile?.username||'';
  const overlay=mk('div',{class:'edit-profile-overlay'});
  overlay.onclick=e=>{if(e.target===overlay){S.editOpen=false;render();}};
  const modal=mk('div',{class:'edit-profile-modal'});
  const hd=mk('div',{class:'edit-profile-header'});
  hd.appendChild(mk('span',{class:'edit-profile-title',text:'Edit profile'}));
  const x=mk('button',{class:'edit-profile-close'});
  x.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  x.onclick=()=>{S.editOpen=false;render();};hd.appendChild(x);modal.appendChild(hd);
  const body=mk('div',{class:'edit-profile-body'});

  // Avatar section
  const avSec=mk('div',{class:'edit-av-section'});
  const avWrap=mk('div',{class:'edit-av-wrap'});
  const avEl=buildAv(S.profile,80,'edit-av');
  avWrap.appendChild(avEl);
  const avOv=mk('div',{class:'edit-av-overlay'});
  avOv.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`;
  avWrap.appendChild(avOv);
  avSec.appendChild(avWrap);
  const avBtn=mk('button',{class:'edit-av-btn',text:'Change profile photo'});
  const avInp=mk('input',{type:'file',accept:'image/*'});avInp.style.display='none';
  avBtn.onclick=()=>avInp.click();
  avInp.onchange=async()=>{
    const f=avInp.files[0];if(!f)return;
    const path=`avatars/${S.user.id}.${f.name.split('.').pop()}`;
    const {error}=await sb.storage.from('media').upload(path,f,{cacheControl:'3600',upsert:true});
    if(!error){const {data:{publicUrl}}=sb.storage.from('media').getPublicUrl(path);await sb.from('profiles').update({avatar_url:publicUrl}).eq('id',S.user.id);S.profile.avatar_url=publicUrl;toast('Photo updated!','success');}
    else toast('Upload failed: '+error.message,'error');
  };
  avSec.appendChild(avBtn);avSec.appendChild(avInp);body.appendChild(avSec);

  [{lbl:'Display name',val:dname,ph:'Your name',cb:v=>dname=v},{lbl:'Username',val:username,ph:'username',cb:v=>username=v}].forEach(({lbl,val,ph,cb})=>{
    const f=mk('div',{class:'edit-form-field'});
    f.appendChild(mk('label',{class:'edit-form-label',text:lbl}));
    const inp=mk('input',{class:'edit-form-inp',value:val,placeholder:ph,type:'text'});
    inp.oninput=e=>cb(e.target.value);
    f.appendChild(inp);body.appendChild(f);
  });

  const bioField=mk('div',{class:'edit-form-field'});
  bioField.appendChild(mk('label',{class:'edit-form-label',text:'Bio'}));
  const bioTa=mk('textarea',{class:'edit-form-ta',placeholder:'Write something about yourself...'});
  bioTa.value=bio;bioTa.rows=4;
  const bioCount=mk('div',{class:'edit-form-char-count',text:bio.length+'/'+MAX_BIO});
  bioTa.oninput=e=>{bio=e.target.value;const ov=bio.length>MAX_BIO;bioCount.textContent=bio.length+'/'+MAX_BIO;bioCount.className='edit-form-char-count'+(ov?' over':'');};
  bioField.appendChild(bioTa);bioField.appendChild(bioCount);body.appendChild(bioField);
  modal.appendChild(body);

  const foot=mk('div',{class:'edit-profile-footer'});
  const cancel=mk('button',{class:'edit-profile-cancel',text:'Cancel',onclick:()=>{S.editOpen=false;render();}});
  const save=mk('button',{class:'edit-profile-save',text:'Save'});
  save.onclick=async()=>{
    if(bio.length>MAX_BIO){toast('Bio is too long','error');return;}
    save.disabled=true;save.textContent='Saving...';
    await sb.from('profiles').update({display_name:dname,bio,username}).eq('id',S.user.id);
    S.profile.display_name=dname;S.profile.bio=bio;S.profile.username=username;
    const pi=S.profiles.findIndex(p=>p.id===S.user.id);
    if(pi>=0)S.profiles[pi]={...S.profiles[pi],display_name:dname,bio,username};
    S.editOpen=false;render();toast('Profile updated! ✅','success');
  };
  foot.appendChild(cancel);foot.appendChild(save);modal.appendChild(foot);
  overlay.appendChild(modal);return overlay;
}

// ═══════════════════════════════════════════════════════════════════════
//  DMs
// ═══════════════════════════════════════════════════════════════════════
function renderDmView(){
  const view=mk('div',{class:'dm-view',style:'flex:1'});

  // ── LEFT: Inbox list ─────────────────────────────────
  const left=mk('div',{class:'dm-list'});

  const lhd=mk('div',{class:'dm-list-header'});
  const htitle=mk('div',{style:'display:flex;flex-direction:column;gap:2px;flex:1'});
  htitle.appendChild(mk('div',{class:'dm-list-title',text:'Inbox'}));
  htitle.appendChild(mk('div',{style:'font-size:11px;color:var(--text3)',text:(S.follows.filter(f=>f.follower_id===S.profile?.id).length)+' conversations'}));
  lhd.appendChild(htitle);
  const compBtn=mk('button',{class:'dm-compose-btn',title:'New message'});
  compBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
  lhd.appendChild(compBtn);
  left.appendChild(lhd);

  // Search bar
  const srchWrap=mk('div',{style:'padding:8px 12px;border-bottom:1px solid var(--border)'});
  const srchInp=mk('input',{type:'search',placeholder:'Search messages...',style:'width:100%;background:var(--bg3);border:none;border-radius:16px;padding:7px 12px 7px 32px;font-size:12px;color:var(--text);outline:none;font-family:inherit'});
  const srchWrapInner=mk('div',{style:'position:relative'});
  srchWrapInner.innerHTML=`<svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`;
  srchWrapInner.appendChild(srchInp);
  srchWrap.appendChild(srchWrapInner);
  left.appendChild(srchWrap);

  const myF=new Set(S.follows.filter(f=>f.follower_id===S.profile?.id).map(f=>f.following_id));
  let convProfiles=S.profiles.filter(p=>p.id!==S.profile?.id&&myF.has(p.id));

  const convs=mk('div',{class:'dm-conversations'});

  function renderConvList(filter=''){
    convs.innerHTML='';
    const filtered=filter?convProfiles.filter(p=>(p.display_name||p.username).toLowerCase().includes(filter.toLowerCase())):convProfiles;
    if(filtered.length===0){
      const emp=mk('div',{class:'dm-empty-state'});
      emp.innerHTML=filter
        ?`<div style="font-size:32px">🔍</div><div class="dm-empty-title" style="font-size:14px">No results</div>`
        :`<div class="dm-empty-icon">✉️</div><div class="dm-empty-title">Empty inbox</div><div class="dm-empty-sub">Follow people to message them</div>`;
      convs.appendChild(emp);return;
    }
    filtered.forEach((p,idx)=>{
      const msgs=S.msgs[p.id]||[];
      const last=msgs[msgs.length-1];
      const isActive=S.activeDm===p.id;
      const unread=!isActive&&msgs.filter(m=>m.sender!==S.user.id&&!m.read).length;

      const item=mk('div',{class:'dm-conv-item'+(isActive?' active':'')+(unread?' unread':'')});
      item.style.cssText='display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;position:relative';
      item.onmouseenter=()=>{if(!isActive)item.style.background='var(--bg2)';};
      item.onmouseleave=()=>{if(!isActive)item.style.background='';};

      // Avatar with online indicator
      const avWrap=mk('div',{style:'position:relative;flex-shrink:0'});
      avWrap.appendChild(buildAv(p,40,''));
      if(idx<3){// show as online for demo
        const dot=mk('div',{style:'position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--bg1)'});
        avWrap.appendChild(dot);
      }
      item.appendChild(avWrap);

      const info=mk('div',{style:'flex:1;min-width:0'});
      const row1=mk('div',{style:'display:flex;align-items:baseline;justify-content:space-between;margin-bottom:3px'});
      const name=mk('div',{style:`font-size:13px;font-weight:${unread?700:500};color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px`,text:p.display_name||p.username});
      const time=mk('div',{style:'font-size:10px;color:var(--text3);flex-shrink:0;font-family:"DM Mono",monospace',text:last?timeAgo(last.ts):'now'});
      row1.appendChild(name);row1.appendChild(time);
      info.appendChild(row1);

      const preview=mk('div',{style:`font-size:12px;color:${unread?'var(--text2)':'var(--text3)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${unread?600:400}`,
        text:last?(last.sender===S.user.id?'You: '+last.text:last.text):'Say hi! 👋'});
      info.appendChild(preview);

      // unread badge
      if(unread){
        const badge=mk('div',{style:'position:absolute;right:12px;bottom:14px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px',text:String(unread)});
        item.appendChild(badge);
      }

      item.appendChild(info);
      item.onclick=()=>{S.activeDm=p.id;render();};
      convs.appendChild(item);
    });
  }

  srchInp.oninput=e=>renderConvList(e.target.value);
  renderConvList();
  left.appendChild(convs);
  view.appendChild(left);

  // ── RIGHT: Chat / Reading pane ───────────────────────
  const chat=mk('div',{class:'dm-chat'});

  if(!S.activeDm){
    // Empty state - mailbox style
    const emp=mk('div',{style:'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text3);padding:40px'});
    emp.innerHTML=`
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="color:var(--border3)">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <div style="font-size:18px;font-weight:700;color:var(--text2)">Select a conversation</div>
      <div style="font-size:13px;text-align:center;line-height:1.6;max-width:220px">Choose from your inbox on the left to start reading</div>`;
    chat.appendChild(emp);
  } else {
    const activePro=S.profiles.find(p=>p.id===S.activeDm)||{username:'unknown'};
    const convMsgs=S.msgs[S.activeDm]||[];

    // Header - email style
    const chd=mk('div',{style:'padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg1);display:flex;align-items:center;gap:12px;flex-shrink:0'});

    const headerLeft=mk('div',{style:'display:flex;align-items:center;gap:10px;flex:1;min-width:0'});
    const hav=buildAv(activePro,38,'');hav.style.cursor='pointer';hav.onclick=()=>goProfile(S.activeDm);
    headerLeft.appendChild(hav);
    const hmeta=mk('div',{style:'flex:1;min-width:0'});
    const hname=mk('div',{style:'font-size:14px;font-weight:600;cursor:pointer',text:activePro.display_name||activePro.username});
    hname.onclick=()=>goProfile(S.activeDm);
    const hsub=mk('div',{style:'font-size:11px;color:var(--text3);font-family:"DM Mono",monospace',text:'@'+activePro.username+' · '+convMsgs.length+' message'+(convMsgs.length!==1?'s':'')});
    hmeta.appendChild(hname);hmeta.appendChild(hsub);
    headerLeft.appendChild(hmeta);
    chd.appendChild(headerLeft);

    // Header actions
    const hacts=mk('div',{style:'display:flex;gap:4px'});
    [{ico:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.92 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>',label:'Call'},
     {ico:'<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>',label:'Video'},
     {ico:'<circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>',label:'More'},
    ].forEach(({ico,label})=>{
      const b=mk('button',{class:'dm-chat-action-btn',title:label});
      b.innerHTML=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ico}</svg>`;
      b.onclick=()=>toast(`${label} coming soon`);
      hacts.appendChild(b);
    });
    chd.appendChild(hacts);
    chat.appendChild(chd);

    // Messages
    const msgs=mk('div',{class:'dm-messages'});
    if(convMsgs.length===0){
      msgs.appendChild(mk('div',{class:'dm-day-divider',text:'New conversation'}));
      const gr=mk('div',{style:'display:flex;justify-content:center;padding:20px 0'});
      const gb=mk('div',{style:'background:var(--bg3);border:1px solid var(--border2);border-radius:16px;padding:14px 20px;font-size:13px;color:var(--text2);text-align:center'});
      gb.innerHTML=`<div style="font-size:28px;margin-bottom:8px">👋</div><div style="font-weight:600;margin-bottom:4px">${activePro.display_name||activePro.username}</div><div style="color:var(--text3);font-size:12px">Send them a message!</div>`;
      gr.appendChild(gb);msgs.appendChild(gr);
    } else {
      let lastDate='';
      convMsgs.forEach(msg=>{
        const d=new Date(msg.ts).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
        if(d!==lastDate){msgs.appendChild(mk('div',{class:'dm-day-divider',text:d}));lastDate=d;}
        const isMine=msg.sender===S.user.id;
        const mEl=mk('div',{class:'dm-msg '+(isMine?'mine':'theirs')});
        if(!isMine){
          const mav=buildAv(activePro,24,'');
          mav.style.cssText='flex-shrink:0;margin-top:2px;align-self:flex-end';
          mEl.style.cssText='align-items:flex-end;flex-direction:row;gap:6px;display:flex';
          mEl.appendChild(mav);
        }
        const bubble=mk('div',{class:'dm-msg-bubble',text:msg.text});
        const meta=mk('div',{class:'dm-msg-meta',text:timeAgo(msg.ts)});
        const bwrap=mk('div',{style:'display:flex;flex-direction:column;gap:2px;'+(isMine?'align-items:flex-end':'align-items:flex-start')});
        bwrap.appendChild(bubble);bwrap.appendChild(meta);
        mEl.appendChild(bwrap);
        msgs.appendChild(mEl);
      });
    }
    setTimeout(()=>msgs.scrollTop=msgs.scrollHeight,0);
    chat.appendChild(msgs);

    // Compose input area - email style
    const ia=mk('div',{style:'border-top:1px solid var(--border);background:var(--bg1);flex-shrink:0'});

    // "To" bar
    const toBar=mk('div',{style:'padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px'});
    toBar.appendChild(mk('span',{style:'font-size:11px;color:var(--text3);font-weight:600;font-family:"DM Mono",monospace',text:'TO'}));
    const toChip=mk('div',{style:'background:var(--bg3);border-radius:12px;padding:3px 10px;font-size:12px;color:var(--text);display:flex;align-items:center;gap:6px'});
    toChip.appendChild(buildAv(activePro,16,''));
    toChip.appendChild(mk('span',{text:activePro.display_name||activePro.username}));
    toBar.appendChild(toChip);
    ia.appendChild(toBar);

    // Textarea
    const taWrap=mk('div',{style:'padding:10px 16px 6px'});
    const inp=mk('textarea',{class:'dm-inp',placeholder:'Write a message...',style:'border-radius:8px'});
    inp.rows=3;
    inp.oninput=()=>{sendBtn.disabled=!inp.value.trim();};
    inp.onkeydown=e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();sendBtn.click();}};
    taWrap.appendChild(inp);ia.appendChild(taWrap);

    // Bottom toolbar
    const toolbar=mk('div',{style:'padding:6px 16px 12px;display:flex;align-items:center;gap:6px'});
    const sendBtn=mk('button',{style:'padding:7px 18px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px'});
    sendBtn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send`;
    sendBtn.disabled=true;
    sendBtn.onmouseenter=()=>sendBtn.style.background='var(--accent2)';
    sendBtn.onmouseleave=()=>sendBtn.style.background='var(--accent)';
    sendBtn.onclick=()=>{
      const txt=inp.value.trim();if(!txt)return;
      if(!S.msgs[S.activeDm])S.msgs[S.activeDm]=[];
      S.msgs[S.activeDm].push({sender:S.user.id,text:txt,ts:new Date().toISOString()});
      inp.value='';sendBtn.disabled=true;
      const msgEl=chat.querySelector('.dm-messages');
      if(msgEl){
        const mEl=mk('div',{class:'dm-msg mine'});
        const bwrap=mk('div',{style:'display:flex;flex-direction:column;align-items:flex-end;gap:2px'});
        bwrap.appendChild(mk('div',{class:'dm-msg-bubble',text:txt}));
        bwrap.appendChild(mk('div',{class:'dm-msg-meta',text:'just now'}));
        mEl.appendChild(bwrap);
        msgEl.appendChild(mEl);msgEl.scrollTop=msgEl.scrollHeight;
      }
    };
    toolbar.appendChild(sendBtn);
    const hint=mk('span',{style:'font-size:11px;color:var(--text3);margin-left:8px',text:'Ctrl+Enter to send'});
    toolbar.appendChild(hint);

    // Attach btn
    const attBtn=mk('button',{style:'margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;border-radius:8px;display:flex;align-items:center;transition:color .18s',title:'Attach'});
    attBtn.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>`;
    attBtn.onmouseenter=()=>attBtn.style.color='var(--accent2)';
    attBtn.onmouseleave=()=>attBtn.style.color='var(--text3)';
    toolbar.appendChild(attBtn);
    ia.appendChild(toolbar);
    chat.appendChild(ia);
  }

  view.appendChild(chat);
  return view;
}

// ═══════════════════════════════════════════════════════════════════════
//  CREATE MODAL
// ═══════════════════════════════════════════════════════════════════════
function renderModal(){
  const type=S.modal?.type;
  if(type==='select')return renderSelectModal();
  if(type==='post'||type==='story')return renderUploadModal(type);
  if(type==='reel')return renderReelModal();
  return mk('div',{});
}

function renderSelectModal(){
  const overlay=mk('div',{class:'create-modal-overlay'});
  overlay.onclick=e=>{if(e.target===overlay){S.modal=null;render();}};
  const modal=mk('div',{class:'create-modal'});
  const hd=mk('div',{class:'create-modal-header'});
  hd.appendChild(mk('span',{class:'create-modal-title',text:'Create'}));
  const x=mk('button',{class:'create-modal-close'});
  x.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  x.onclick=()=>{S.modal=null;render();};hd.appendChild(x);modal.appendChild(hd);
  const body=mk('div',{class:'create-modal-body'});
  const grid=mk('div',{class:'create-type-grid'});
  [{type:'post',icon:'📷',label:'Post'},{type:'story',icon:'⭕',label:'Story'},{type:'reel',icon:'🎬',label:'Reel'}].forEach(item=>{
    const btn=mk('div',{class:'create-type-btn'});
    btn.appendChild(mk('span',{class:'create-type-icon',text:item.icon}));
    btn.appendChild(mk('span',{class:'create-type-label',text:item.label}));
    btn.onclick=()=>{S.modal={type:item.type};render();};
    grid.appendChild(btn);
  });
  body.appendChild(grid);modal.appendChild(body);overlay.appendChild(modal);return overlay;
}

function renderUploadModal(type){
  let file=null,mtype=null,caption='';
  const overlay=mk('div',{class:'create-modal-overlay'});
  overlay.onclick=e=>{if(e.target===overlay){S.modal=null;render();}};
  const modal=mk('div',{class:'create-modal'});
  const hd=mk('div',{class:'create-modal-header'});
  hd.appendChild(mk('span',{class:'create-modal-title',text:type==='story'?'New Story':'New Post'}));
  const x=mk('button',{class:'create-modal-close'});
  x.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  x.onclick=()=>{S.modal=null;render();};hd.appendChild(x);modal.appendChild(hd);
  const body=mk('div',{class:'create-modal-body'});
  const zone=mk('div',{class:'upload-drop-zone'});
  zone.innerHTML=`<div class="upload-icon">${type==='story'?'⭕':'📷'}</div><div class="upload-title">Select photo or video</div><div class="upload-sub">JPG, PNG, GIF, MP4 supported</div><div class="upload-or">— or —</div>`;
  const browseBtn=mk('button',{class:'upload-browse-btn',text:'Browse files'});
  const finp=mk('input',{type:'file',accept:'image/*,video/*'});finp.style.display='none';
  const prevWrap=mk('div',{});
  const submitBtn=mk('button',{class:'create-submit-btn'});
  submitBtn.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Share`;
  submitBtn.disabled=true;

  const handleFile=f=>{
    file=f;mtype=f.type.startsWith('video/')?'video':'image';
    const url=URL.createObjectURL(f);
    prevWrap.innerHTML='';
    const pw=mk('div',{class:'upload-preview-wrap'});
    if(mtype==='video'){const v=document.createElement('video');v.src=url;v.className='upload-preview-video';v.controls=true;pw.appendChild(v);}
    else{const img=document.createElement('img');img.src=url;img.className='upload-preview-img';pw.appendChild(img);}
    const rm=mk('button',{class:'upload-preview-remove',text:'×'});rm.onclick=()=>{file=null;mtype=null;prevWrap.innerHTML='';zone.style.display='block';submitBtn.disabled=true;};
    pw.appendChild(rm);prevWrap.appendChild(pw);
    zone.style.display='none';submitBtn.disabled=false;
  };

  finp.onchange=()=>{if(finp.files[0])handleFile(finp.files[0]);};
  browseBtn.onclick=()=>finp.click();
  zone.onclick=()=>finp.click();
  zone.ondragover=e=>{e.preventDefault();zone.classList.add('drag-over');};
  zone.ondragleave=()=>zone.classList.remove('drag-over');
  zone.ondrop=e=>{e.preventDefault();zone.classList.remove('drag-over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};
  zone.appendChild(browseBtn);zone.appendChild(finp);
  body.appendChild(zone);body.appendChild(prevWrap);

  if(type==='post'){
    body.appendChild(mk('label',{class:'create-form-label',text:'Caption'}));
    const cap=mk('textarea',{class:'create-form-ta',placeholder:"Write a caption..."});cap.rows=3;
    cap.oninput=e=>{caption=e.target.value;submitBtn.disabled=!caption.trim()&&!file;};body.appendChild(cap);
  }
  modal.appendChild(body);

  const prog=mk('div',{class:'create-progress',style:'display:none'});
  const pf=mk('div',{class:'create-progress-fill',style:'width:0'});
  prog.appendChild(pf);modal.appendChild(prog);

  const foot=mk('div',{class:'create-modal-footer'});
  const cancel=mk('button',{class:'create-cancel-btn',text:'Cancel',onclick:()=>{S.modal=null;render();}});

  submitBtn.onclick=async()=>{
    if(!file&&type==='story'){toast('Select a photo or video first','error');return;}
    if(!file&&type==='post'&&!caption.trim()){toast('Write something or add a photo','error');return;}
    submitBtn.disabled=true;submitBtn.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Uploading...`;
    prog.style.display='block';pf.style.width='30%';
    try{
      let mediaUrl=null;
      if(file){
        const path=`${S.user.id}/${Date.now()}.${file.name.split('.').pop()}`;
        pf.style.width='60%';
        const cf2=await compressImage(file);
        const {error:ue}=await sb.storage.from('media').upload(path,cf2,{cacheControl:'3600'});
        if(ue)throw ue;
        const {data:{publicUrl}}=sb.storage.from('media').getPublicUrl(path);
        mediaUrl=publicUrl;pf.style.width='80%';
      }
      if(type==='post'){
        await sb.from('posts').insert({user_id:S.user.id,content:caption,media_url:mediaUrl,media_type:mtype});
        toast('Post shared! ✨','success');
      } else {
        if(!mediaUrl)throw new Error('Upload failed');
        await sb.from('stories').insert({user_id:S.user.id,media_url:mediaUrl,media_type:mtype});
        toast('Story added! ⭕','success');
      }
      pf.style.width='100%';
      S.modal=null;await loadAll();render();
    } catch(err){toast('Error: '+err.message,'error');submitBtn.disabled=false;submitBtn.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Share`;}
  };
  foot.appendChild(cancel);foot.appendChild(submitBtn);modal.appendChild(foot);
  overlay.appendChild(modal);return overlay;
}

function renderReelModal(){
  let file=null,caption='',fbUrl='';
  const overlay=mk('div',{class:'create-modal-overlay'});
  overlay.onclick=e=>{if(e.target===overlay){S.modal=null;render();}};
  const modal=mk('div',{class:'create-modal'});
  const hd=mk('div',{class:'create-modal-header'});
  hd.appendChild(mk('span',{class:'create-modal-title',text:'New Reel'}));
  const x=mk('button',{class:'create-modal-close'});
  x.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  x.onclick=()=>{S.modal=null;render();};hd.appendChild(x);modal.appendChild(hd);
  const body=mk('div',{class:'create-modal-body'});
  const zone=mk('div',{class:'upload-drop-zone'});
  zone.innerHTML=`<div class="upload-icon">🎬</div><div class="upload-title">Select a video</div><div class="upload-sub">MP4, MOV — vertical videos work best</div><div class="upload-or">— or —</div>`;
  const browseBtn=mk('button',{class:'upload-browse-btn',text:'Browse videos'});
  const finp=mk('input',{type:'file',accept:'video/*'});finp.style.display='none';
  const prevWrap=mk('div',{});
  finp.onchange=()=>{
    file=finp.files[0];if(!file)return;
    const url=URL.createObjectURL(file);
    prevWrap.innerHTML='';zone.style.display='none';
    const pw=mk('div',{class:'upload-preview-wrap'});
    const vid=document.createElement('video');vid.src=url;vid.className='upload-preview-video';vid.controls=true;
    const rm=mk('button',{class:'upload-preview-remove',text:'×'});rm.onclick=()=>{file=null;prevWrap.innerHTML='';zone.style.display='block';};
    pw.appendChild(vid);pw.appendChild(rm);prevWrap.appendChild(pw);
  };
  browseBtn.onclick=()=>finp.click();zone.onclick=()=>finp.click();
  zone.appendChild(browseBtn);zone.appendChild(finp);
  body.appendChild(zone);body.appendChild(prevWrap);

  body.appendChild(mk('label',{class:'create-form-label',text:'Caption'}));
  const cap=mk('textarea',{class:'create-form-ta',placeholder:'Add a caption...'});cap.rows=3;cap.oninput=e=>caption=e.target.value;body.appendChild(cap);

  const fbSec=mk('div',{class:'fb-embed-section'});
  fbSec.appendChild(mk('div',{class:'fb-embed-label',html:'<span>🎬</span> OR embed a Facebook Video'}));
  fbSec.appendChild(mk('div',{class:'fb-embed-sub',text:'Paste a public Facebook video URL to show it as a reel'}));
  const fbInp=mk('input',{class:'fb-embed-inp',placeholder:'https://www.facebook.com/watch/?v=...',type:'url'});
  fbInp.oninput=e=>fbUrl=e.target.value;fbSec.appendChild(fbInp);
  body.appendChild(fbSec);
  modal.appendChild(body);

  const foot=mk('div',{class:'create-modal-footer'});
  const cancel=mk('button',{class:'create-cancel-btn',text:'Cancel',onclick:()=>{S.modal=null;render();}});
  const submitBtn=mk('button',{class:'create-submit-btn',text:'Post Reel'});
  submitBtn.onclick=async()=>{
    if(!file&&!fbUrl.trim()){toast('Upload a video or paste a Facebook URL','error');return;}
    submitBtn.disabled=true;submitBtn.textContent='Posting...';
    try{
      let videoUrl=null;
      if(file){
        const path=`${S.user.id}/${Date.now()}.${file.name.split('.').pop()}`;
        const {error}=await sb.storage.from('media').upload(path,file);
        if(error)throw error;
        const {data:{publicUrl}}=sb.storage.from('media').getPublicUrl(path);
        videoUrl=publicUrl;
      }
      await sb.from('reels').insert({user_id:S.user.id,video_url:videoUrl||'',caption,fb_embed:fbUrl.trim()||null});
      toast('Reel posted! 🎬','success');S.modal=null;await loadAll();render();
    } catch(err){toast('Error: '+err.message,'error');submitBtn.disabled=false;submitBtn.textContent='Post Reel';}
  };
  foot.appendChild(cancel);foot.appendChild(submitBtn);modal.appendChild(foot);
  overlay.appendChild(modal);return overlay;
}

// ═══════════════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════════════
function goProfile(userId){
  S.page='profile';S.viewUser=userId;render();
}

async function handleFollow(userId){
  const myF=new Set(S.follows.filter(f=>f.follower_id===S.profile?.id).map(f=>f.following_id));
  if(myF.has(userId)){
    await sb.from('follows').delete().eq('follower_id',S.user.id).eq('following_id',userId);
    S.follows=S.follows.filter(f=>!(f.follower_id===S.user.id&&f.following_id===userId));
  } else {
    await sb.from('follows').insert({follower_id:S.user.id,following_id:userId});
    S.follows.push({follower_id:S.user.id,following_id:userId});
    await sb.from('notifications').insert({user_id:userId,from_id:S.user.id,type:'follow'});
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════════════════════════════════════
async function loadAll(){
  const now=new Date().toISOString();
  const [postsR,storiesR,reelsR,profsR,followsR,likesR,reelLikesR,notifsR]=await Promise.all([
    sb.from('posts').select('*').order('created_at',{ascending:false}).limit(100),
    sb.from('stories').select('*').gte('expires_at',now),
    sb.from('reels').select('*').order('created_at',{ascending:false}).limit(50),
    sb.from('profiles').select('*'),
    sb.from('follows').select('*'),
    sb.from('likes').select('post_id').eq('user_id',S.user.id).not('post_id','is',null),
    sb.from('likes').select('reel_id').eq('user_id',S.user.id).not('reel_id','is',null),
    sb.from('notifications').select('*').eq('user_id',S.user.id).order('created_at',{ascending:false}).limit(50),
  ]);
  S.posts=postsR.data||[];
  S.stories=storiesR.data||[];
  S.reels=reelsR.data||[];
  S.profiles=profsR.data||[];
  S.follows=followsR.data||[];
  S.postLikes=new Set((likesR.data||[]).map(l=>l.post_id));
  S.reelLikes=new Set((reelLikesR.data||[]).map(l=>l.reel_id));
  S.notifs=notifsR.data||[];
  await buildCounts();
}

async function loadPosts(){
  const {data}=await sb.from('posts').select('*').order('created_at',{ascending:false}).limit(100);
  S.posts=data||[];await buildCounts();
}

async function buildCounts(){
  const [lc,rlc,cc,rcc]=await Promise.all([
    sb.from('likes').select('post_id').not('post_id','is',null),
    sb.from('likes').select('reel_id').not('reel_id','is',null),
    sb.from('comments').select('post_id').not('post_id','is',null),
    sb.from('comments').select('reel_id').not('reel_id','is',null),
  ]);
  const pm={};(lc.data||[]).forEach(l=>pm[l.post_id]=(pm[l.post_id]||0)+1);
  S.posts.forEach(p=>p.like_count=pm[p.id]||0);
  const rm={};(rlc.data||[]).forEach(l=>rm[l.reel_id]=(rm[l.reel_id]||0)+1);
  S.reels.forEach(r=>r.like_count=rm[r.id]||0);
  const cm={};(cc.data||[]).forEach(c=>cm[c.post_id]=(cm[c.post_id]||0)+1);
  S.posts.forEach(p=>p.comment_count=cm[p.id]||0);
  const rcm={};(rcc.data||[]).forEach(c=>rcm[c.reel_id]=(rcm[c.reel_id]||0)+1);
  S.reels.forEach(r=>r.comment_count=rcm[r.id]||0);
}

function setupRealtime(){
  rtChannels.forEach(c=>sb.removeChannel(c));rtChannels=[];
  const ch=sb.channel('socialbox-rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},async p=>{
      if(!S.posts.find(x=>x.id===p.new.id)){
        S.posts.unshift({...p.new,like_count:0,comment_count:0});
        const prof=S.profiles.find(x=>x.id===p.new.user_id);
        if(p.new.user_id!==S.user.id&&prof)toast('📸 @'+prof.username+' posted','info');
        render();
      }
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'posts'},p=>{
      S.posts=S.posts.filter(x=>x.id!==p.old.id);render();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'stories'},p=>{
      if(!S.stories.find(x=>x.id===p.new.id)){S.stories.push(p.new);render();}
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'reels'},p=>{
      if(!S.reels.find(x=>x.id===p.new.id)){S.reels.unshift({...p.new,like_count:0,comment_count:0});render();}
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:'user_id=eq.'+S.user.id},p=>{
      if(!S.notifs.find(x=>x.id===p.new.id)){S.notifs.unshift(p.new);render();}
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'follows'},p=>{
      if(!S.follows.find(x=>x.follower_id===p.new.follower_id&&x.following_id===p.new.following_id)){S.follows.push(p.new);}
    })
    .subscribe();
  rtChannels.push(ch);
}

// ═══════════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════════
async function init(){
  initToasts();
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    S.user=session.user;
    const {data}=await sb.from('profiles').select('*').eq('id',S.user.id).single();
    S.profile=data;
    await loadAll();
    setupRealtime();
  }
  S.loading=false;render();

  sb.auth.onAuthStateChange(async(_,session)=>{
    if(session){
      S.user=session.user;S.loading=true;render();
      const {data}=await sb.from('profiles').select('*').eq('id',S.user.id).single();
      S.profile=data;
      await loadAll();setupRealtime();S.loading=false;
    } else {
      S.user=null;S.profile=null;
      iObservers.forEach(o=>o.disconnect());iObservers=[];
      rtChannels.forEach(c=>sb.removeChannel(c));rtChannels=[];
    }
    render();
  });
}
init();
</script>
