.edit-form-inp{width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--rs);padding:10px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:border-color var(--transition)}
.edit-form-inp:focus{border-color:var(--accent)}
.edit-form-inp::placeholder{color:var(--text4)}
.edit-form-ta{width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--rs);padding:10px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none;resize:vertical;min-height:80px;line-height:1.6;transition:border-color var(--transition)}
.edit-form-ta:focus{border-color:var(--accent)}
.edit-form-char-count{font-size:11px;color:var(--text3);text-align:right;margin-top:3px}
.edit-form-char-count.over{color:var(--red)}
.edit-profile-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.edit-profile-cancel{padding:9px 18px;background:none;border:1.5px solid var(--border2);border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all var(--transition)}
.edit-profile-cancel:hover{border-color:var(--border3);color:var(--text)}
.edit-profile-save{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition)}
.edit-profile-save:hover{background:var(--accent2)}
.edit-profile-save:disabled{opacity:.5;cursor:not-allowed}

/* ══════════════════════════════════════════════════════
   EMPTY STATES
══════════════════════════════════════════════════════ */
.empty-state{padding:48px 24px;text-align:center;color:var(--text3)}
.empty-state-icon{font-size:52px;margin-bottom:14px;display:block}
.empty-state-title{font-size:17px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-state-sub{font-size:14px;line-height:1.6;max-width:280px;margin:0 auto}
.empty-state-btn{margin-top:16px;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all var(--transition)}
.empty-state-btn:hover{background:var(--accent2)}

/* ══════════════════════════════════════════════════════
   MOBILE & RESPONSIVE
══════════════════════════════════════════════════════ */
@media (max-width:1100px){
  .right-panel{display:none}
  .reels-side-panel{display:none}
}
@media (max-width:800px){
  .auth-left{display:none}
  .auth-right{width:100%;border:none}
  .sidebar{width:60px}
  .sidebar .sb-logo,.sidebar .sb-search,.sidebar .sb-nav-item .label,.sidebar .sb-user-info,.sidebar .sb-section-label,.sidebar .sb-create-btn .label,.sidebar .sb-nav-badge-wrap{display:none}
  .sidebar .sb-nav-item{justify-content:center;padding:12px 0}
  .sidebar .sb-user{justify-content:center;padding:8px 0}
  .sidebar .sb-create-btn{border-radius:50%;width:40px;height:40px;margin:8px auto;padding:0}
  .sidebar .sb-header{justify-content:center;padding:16px 0 8px}
  .sidebar .sb-collapse-btn{display:none}
}

/* ══════════════════════════════════════════════════════
   UTILITY
══════════════════════════════════════════════════════ */
.hidden{display:none!important}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flex-center{display:flex;align-items:center;justify-content:center}
.font-mono{font-family:'DM Mono',monospace}
</style>

<body>
<div id="root"></div>

<script>

const colorFor = s => { let h=0; for(const c of (s||'?')) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; };
const initials = s => { const p=(s||'?').split(/[\s_]+/); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():(s||'?').slice(0,2).toUpperCase(); };
const fmtCount = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':String(n||0);
const qs = (s,el=document)=>el.querySelector(s);
const qsa = (s,el=document)=>[...el.querySelectorAll(s)];

function timeAgo(ts) {
  const s=Math.floor((Date.now()-new Date(ts))/1000);
  if(s<5)return'just now';if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';
  return new Date(ts).toLocaleDateString([],{month:'short',day:'numeric'});
}

function parseContent(txt) {
  return (txt||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/#(\w+)/g,'<span class="hashtag">#$1</span>')
    .replace(/@(\w+)/g,'<span class="mention">@$1</span>');
}

function getFbEmbed(url) {
  if(!url)return null;
  const u=url.trim();
  if(u.includes('plugins/video.php'))return u;
  return`https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(u)}&width=500&show_text=false&height=700`;
}

function mk(tag, attrs={}, ...kids) {
  const el=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==='class')el.className=v;
    else if(k==='html')el.innerHTML=v;
    else if(k==='text')el.textContent=v;
    else if(k.startsWith('on')&&typeof v==='function')el.addEventListener(k.slice(2),v);
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else el.setAttribute(k,v);
  }
  for(const c of kids){
    if(!c)continue;
    if(typeof c==='string')el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}

function mkSvg(paths, vb='0 0 24 24', fill='none', sw='2') {
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('viewBox',vb); s.setAttribute('fill',fill);
  s.setAttribute('stroke','currentColor'); s.setAttribute('stroke-width',sw);
  s.setAttribute('stroke-linecap','round'); s.setAttribute('stroke-linejoin','round');
  s.innerHTML=paths; return s;
}

let _tc;
function initToasts(){ _tc=mk('div',{class:'toast-container'}); document.body.appendChild(_tc); }
function toast(msg,type='default',dur=3000){
  const icons={success:'✅',error:'❌',info:'ℹ️',default:'💬'};
  const t=mk('div',{class:`toast-item ${type}`},
    mk('span',{class:'toast-icon',text:icons[type]||'💬'}),
    mk('span',{class:'toast-text',text:msg}),
    mk('button',{class:'toast-close',text:'×',onclick:()=>t.remove()})
  );
  _tc.appendChild(t);
  setTimeout(()=>{t.style.animation='notifSlide .3s ease reverse';setTimeout(()=>t.remove(),280);},dur);
}

function compressImage(file,maxW=1200,quality=0.82){
  return new Promise(resolve=>{
    if(!file.type.startsWith('image/')){resolve(file);return;}
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const scale=Math.min(1,maxW/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(b=>resolve(new File([b],file.name.replace(/\.[^.]+$/,'.jpg'),{type:'image/jpeg'})),'image/jpeg',quality);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(file);};
    img.src=url;
  });
}

function renderAuth(){
  let tab='login',sp=false,sp2=false;
  let f={user:'',dname:'',pass:'',conf:''};
  const screen=mk('div',{class:'auth-screen'});

  // Left panel
  const left=mk('div',{class:'auth-left'});
  const mock=mk('div',{class:'auth-mockup'});
  const ms=mk('div',{class:'auth-mockup-screen'});
  const sr=mk('div',{class:'auth-mockup-story'});
  for(let i=0;i<4;i++){
    const ri=mk('div',{class:'auth-mockup-story-item'});
    ri.appendChild(mk('div',{class:'auth-mockup-story-inner'}));
    sr.appendChild(ri);
  }
  ms.appendChild(sr);
  for(let i=0;i<2;i++){
    const p=mk('div',{class:'auth-mockup-post'});
    p.appendChild(mk('div',{class:'auth-mockup-post-img'}));
    const a=mk('div',{class:'auth-mockup-post-actions'});
    a.appendChild(mk('div',{class:'auth-mockup-heart'}));
    a.appendChild(mk('div',{class:'auth-mockup-comment'}));
    p.appendChild(a); ms.appendChild(p);
  }
  mock.appendChild(ms); left.appendChild(mock);
  const tag=mk('div',{class:'auth-tagline'});
  tag.innerHTML='Share your world.<br><span>Connect & inspire.</span>';
  left.appendChild(tag); screen.appendChild(left);

  // Right panel
  const right=mk('div',{class:'auth-right'});
  const msgDiv=mk('div',{});
  right.appendChild(msgDiv);
  const showErr=m=>{msgDiv.innerHTML='';msgDiv.appendChild(mk('div',{class:'auth-err',text:m}));};
  const showOk=m=>{msgDiv.innerHTML='';msgDiv.appendChild(mk('div',{class:'auth-ok',text:m}));};
  const clearMsg=()=>msgDiv.innerHTML='';

  function build(){
    [...right.children].filter(c=>c!==msgDiv).forEach(c=>c.remove());
    clearMsg();
    const logo=mk('div',{class:'auth-logo'}); logo.innerHTML='social<span>box</span>';
    right.insertBefore(logo,msgDiv);
    right.insertBefore(mk('div',{class:'auth-sub',text:'Sign up to see photos and videos.'}),msgDiv);

    const tabs=mk('div',{class:'auth-tabs'});
    ['login','create'].forEach(t=>{
      const b=mk('button',{class:'auth-tab'+(tab===t?' active':''),text:t==='login'?'Log in':'Sign up'});
      b.onclick=()=>{tab=t;build();}; tabs.appendChild(b);
    });
    right.appendChild(tabs);

    // Facebook
    const fb=mk('button',{class:'auth-fb-btn'});
    fb.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg> Continue with Facebook`;
    fb.onclick=async()=>{
      fb.disabled=true; fb.textContent='Connecting...';
      const {error}=await sb.auth.signInWithOAuth({provider:'facebook',options:{redirectTo:window.location.href}});
      if(error){showErr(error.message);fb.disabled=false;}
    };
    right.appendChild(fb);

    // Divider
    const div=mk('div',{class:'auth-divider'});
    div.appendChild(mk('div',{class:'auth-divider-line'}));
    div.appendChild(mk('div',{class:'auth-divider-text',text:'OR'}));
    div.appendChild(mk('div',{class:'auth-divider-line'}));
    right.appendChild(div);

    const form=mk('div',{class:'auth-form'});

    if(tab==='create'){
      form.appendChild(mk('label',{class:'auth-lbl',text:'Display name'}));
      const di=mk('input',{class:'auth-inp',placeholder:'Your Name',type:'text',value:f.dname});
      di.oninput=e=>f.dname=e.target.value; form.appendChild(di);
    }

    form.appendChild(mk('label',{class:'auth-lbl',text:'Username'}));
    const ui=mk('input',{class:'auth-inp',placeholder:'username',type:'text',value:f.user,autocomplete:'username'});
    ui.oninput=e=>f.user=e.target.value.toLowerCase().replace(/\s/g,'');
    form.appendChild(ui);

    form.appendChild(mk('label',{class:'auth-lbl',text:'Password'}));
    const pw=mk('div',{class:'auth-inp-wrap'});
    const pi=mk('input',{class:'auth-inp',placeholder:'6+ characters',type:sp?'text':'password',value:f.pass});
    pi.oninput=e=>f.pass=e.target.value;
    const eye=mk('button',{class:'auth-inp-eye',type:'button'});
    eye.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    eye.onclick=()=>{sp=!sp;pi.type=sp?'text':'password';};
    pw.appendChild(pi); pw.appendChild(eye); form.appendChild(pw);

    if(tab==='create'){
      form.appendChild(mk('label',{class:'auth-lbl',text:'Confirm password'}));
      const cw=mk('div',{class:'auth-inp-wrap'});
      const ci=mk('input',{class:'auth-inp',placeholder:'Repeat password',type:sp2?'text':'password',value:f.conf});
      ci.oninput=e=>f.conf=e.target.value;
      const eye2=mk('button',{class:'auth-inp-eye',type:'button'});
      eye2.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      eye2.onclick=()=>{sp2=!sp2;ci.type=sp2?'text':'password';};
      cw.appendChild(ci); cw.appendChild(eye2); form.appendChild(cw);
    }

    const btn=mk('button',{class:'auth-btn',text:tab==='login'?'Log In':'Sign Up',type:'button'});
    btn.onclick=async e=>{
      // ripple
      const r=btn.getBoundingClientRect();
      const rip=mk('div',{class:'auth-btn-ripple'});
      const sz=Math.max(r.width,r.height);
      rip.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px`;
      btn.appendChild(rip); setTimeout(()=>rip.remove(),600);

      clearMsg();
      if(!f.user.trim()){showErr('Enter a username.');return;}
      if(f.user.length<3){showErr('Username must be at least 3 characters.');return;}
      if(!f.pass){showErr('Enter a password.');return;}
      if(f.pass.length<6){showErr('Password must be at least 6 characters.');return;}
      if(tab==='create'&&f.pass!==f.conf){showErr('Passwords do not match.');return;}
      btn.disabled=true; btn.textContent=tab==='login'?'Logging in...':'Creating account...';
      const proj=SUPABASE_URL.replace('https://','').replace('http://','');
      const email=f.user.trim().toLowerCase().replace(/[^a-z0-9]/g,'')+'@'+proj;
      try{
        if(tab==='login'){
          const {error}=await sb.auth.signInWithPassword({email,password:f.pass});
          if(error)throw error;
        } else {
          const {data:ex}=await sb.from('profiles').select('id').eq('username',f.user.trim()).maybeSingle();
          if(ex){showErr('Username taken.');btn.disabled=false;btn.textContent='Sign Up';return;}
          const {data,error}=await sb.auth.signUp({email,password:f.pass});
          if(error)throw error;
          if(data?.user){
            await sb.from('profiles').update({username:f.user.trim(),display_name:f.dname||f.user.trim(),avatar_color:colorFor(f.user.trim())}).eq('id',data.user.id);
          }
          showOk('Account created! Signing you in...');
        }
      } catch(err){showErr(err.message||'Something went wrong.');btn.disabled=false;btn.textContent=tab==='login'?'Log In':'Sign Up';}
    };
    form.appendChild(btn);
    right.appendChild(form);
    ui.focus();
  }
  build();
  screen.appendChild(right);
  return screen;
}

  const acts=mk('div',{class:'top-bar-actions'});
  if(S.page==='feed'){
    const nb=mk('button',{class:'top-bar-btn',title:'New post',onclick:()=>{S.modal={type:'select'};render();}});
    nb.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>`;
    acts.appendChild(nb);
    const mb=mk('button',{class:'top-bar-btn',onclick:()=>{S.page='messages';render();}});
    mb.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
    acts.appendChild(mb);
  }
  bar.appendChild(acts);
  return bar;
}

// ═══════════════════════════════════════════════════════════════════════
//  AVATAR BUILDER
// ═══════════════════════════════════════════════════════════════════════
function buildAv(prof,size=36,cls=''){
  const w=mk('div',{class:cls});
  w.style.cssText=`width:${size}px;height:${size}px;border-radius:50%;overflow:hidden;flex-shrink:0;position:relative`;
  const inner=mk('div',{});
  inner.style.cssText=`width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*.35)}px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;background:${prof?.avatar_color||colorFor(prof?.username||'?')}`;
  inner.textContent=initials(prof?.display_name||prof?.username||'?');
  w.appendChild(inner);
  if(prof?.avatar_url){
    const img=document.createElement('img');
    img.src=prof.avatar_url;
    img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%';
    img.onerror=()=>img.remove();
    w.appendChild(img);
  }
  return w;
}

// ═══════════════════════════════════════════════════════════════════════
//  FEED VIEW
// ═══════════════════════════════════════════════════════════════════════
function renderFeedView(){
  const view=mk('div',{style:'flex:1;display:flex;flex-direction:column;overflow:hidden'});
  view.appendChild(renderStoriesBar());
  view.appendChild(renderComposeBar());
  const scroll=mk('div',{class:'feed-scroll'});
  scroll.appendChild(renderFeedPosts());
  view.appendChild(scroll);
  return view;
}

function renderFeedPosts(){
  const container=mk('div',{class:'feed-container'});
  const myF=new Set(S.follows.filter(f=>f.follower_id===S.profile?.id).map(f=>f.following_id));
  const posts=S.posts.filter(p=>p.user_id===S.profile?.id||myF.has(p.user_id))
    .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if(posts.length===0){
    const emp=mk('div',{class:'empty-state'});
    emp.innerHTML=`<span class="empty-state-icon">📸</span><div class="empty-state-title">Your feed is empty</div><div class="empty-state-sub">Follow people to see their posts here</div>`;
    const btn=mk('button',{class:'empty-state-btn',text:'Explore people',onclick:()=>{S.page='explore';render();}});
    emp.appendChild(btn); container.appendChild(emp);
  } else {
    posts.forEach((p,i)=>{
      const card=renderPost(p);
      card.style.animationDelay=Math.min(i*.05,.3)+'s';
      container.appendChild(card);
    });
  }
  return container;
}

// ═══════════════════════════════════════════════════════════════════════
//  STORIES BAR
// ═══════════════════════════════════════════════════════════════════════
function renderStoriesBar(){
  const bar=mk('div',{class:'stories-bar'});
  const scroll=mk('div',{class:'stories-scroll'});
  const myStories=S.stories.filter(s=>s.user_id===S.profile?.id&&new Date(s.expires_at)>new Date());
  const myBtn=mk('button',{class:'story-btn'});
  const myRing=mk('div',{class:myStories.length>0?'story-ring':'story-ring no-story'});
  const myInner=mk('div',{class:'story-inner'});
  if(S.profile?.avatar_url){const img=document.createElement('img');img.src=S.profile.avatar_url;myInner.appendChild(img);}
  else{myInner.style.background=S.profile?.avatar_color||colorFor(S.profile?.username||'');myInner.textContent=initials(S.profile?.display_name||S.profile?.username||'');}
  if(myStories.length===0){myInner.textContent='+';myInner.style.fontSize='24px';myInner.style.color='var(--text3)';}
  const rw=mk('div',{class:'story-ring-wrap'});
  myRing.appendChild(myInner); rw.appendChild(myRing);
  if(myStories.length>0)rw.appendChild(mk('div',{class:'story-add-badge',text:'+'}));
  myBtn.appendChild(rw);
  myBtn.appendChild(mk('div',{class:'story-name my',text:'Your story'}));
  myBtn.onclick=()=>myStories.length>0?openStoryViewer(myStories,0):(S.modal={type:'story'},render());
  scroll.appendChild(myBtn);

  const now=new Date();
  const active=S.stories.filter(s=>s.user_id!==S.profile?.id&&new Date(s.expires_at)>now);
  const byUser={};
  active.forEach(s=>{if(!byUser[s.user_id])byUser[s.user_id]=[];byUser[s.user_id].push(s);});
  const myF=new Set(S.follows.filter(f=>f.follower_id===S.profile?.id).map(f=>f.following_id));
  Object.entries(byUser).filter(([uid])=>myF.has(uid)).forEach(([uid,sts])=>{
    const prof=S.profiles.find(p=>p.id===uid);if(!prof)return;
    const btn=mk('button',{class:'story-btn'});
    const ring=mk('div',{class:'story-ring'});
    const inner=mk('div',{class:'story-inner'});
    if(prof.avatar_url){const img=document.createElement('img');img.src=prof.avatar_url;inner.appendChild(img);}
    else{inner.style.background=prof.avatar_color||colorFor(prof.username);inner.textContent=initials(prof.display_name||prof.username);}
    const rw2=mk('div',{class:'story-ring-wrap'});
    ring.appendChild(inner);rw2.appendChild(ring);
    btn.appendChild(rw2);btn.appendChild(mk('div',{class:'story-name',text:prof.username}));
    btn.onclick=()=>openStoryViewer(sts,0);
    scroll.appendChild(btn);
  });
  bar.appendChild(scroll);
  return bar;
}

// ═══════════════════════════════════════════════════════════════════════
//  COMPOSE BAR
// ═══════════════════════════════════════════════════════════════════════
function renderComposeBar(){
  const bar=mk('div',{class:'compose-post-bar'});
  bar.appendChild(buildAv(S.profile,36,'compose-av'));
  const right=mk('div',{class:'compose-right'});
  let content='',file=null,mtype=null;
  const ta=mk('textarea',{class:'compose-ta',placeholder:"What's on your mind?"});
  ta.rows=2;
  const counter=mk('span',{class:'compose-counter',text:String(MAX_POST)});
  const submitBtn=mk('button',{class:'compose-submit-btn',text:'Post'});
  submitBtn.disabled=true;
  ta.oninput=()=>{
    content=ta.value;
    const left=MAX_POST-content.length;
    counter.textContent=left;
    counter.className='compose-counter'+(left<50?' warn':'')+(left<0?' over':'');
    submitBtn.disabled=(content.trim().length===0&&!file)||left<0;
  };
  right.appendChild(ta);
  const prevContainer=mk('div',{});
  right.appendChild(prevContainer);
  const footer=mk('div',{class:'compose-footer'});

  // Photo
  const photoBtn=mk('button',{class:'compose-media-btn',title:'Photo/Video'});
  photoBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
  const fileInp=mk('input',{type:'file',accept:'image/*,video/*'});
  fileInp.style.display='none';
  fileInp.onchange=()=>{
    file=fileInp.files[0];if(!file)return;
    mtype=file.type.startsWith('video/')?'video':'image';
    const url=URL.createObjectURL(file);
    prevContainer.innerHTML='';
    const pw=mk('div',{class:'compose-media-preview'});
    if(mtype==='video'){const v=document.createElement('video');v.src=url;v.controls=true;pw.appendChild(v);}
    else{const img=document.createElement('img');img.src=url;pw.appendChild(img);}
    const rm=mk('button',{class:'compose-media-remove',text:'×'});
    rm.onclick=()=>{file=null;mtype=null;prevContainer.innerHTML='';submitBtn.disabled=content.trim().length===0;};
    pw.appendChild(rm);prevContainer.appendChild(pw);
    submitBtn.disabled=false;
  };
  photoBtn.onclick=()=>fileInp.click();
  footer.appendChild(photoBtn);footer.appendChild(fileInp);

  // Emoji
  const emojiBtn=mk('button',{class:'compose-media-btn',title:'Emoji'});
  emojiBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>`;
  emojiBtn.onclick=e=>{
    e.stopPropagation();
    const ex=qs('.emoji-picker');if(ex){ex.remove();return;}
    const picker=buildEmojiPicker(em=>{ta.value+=em;content=ta.value;submitBtn.disabled=false;picker.remove();});
    footer.appendChild(picker);
    document.addEventListener('click',()=>picker.remove(),{once:true});
  };
  footer.appendChild(emojiBtn);
  footer.appendChild(counter);
  submitBtn.onclick=async()=>{
    if(!content.trim()&&!file)return;
    submitBtn.disabled=true;submitBtn.textContent='Posting...';
    try{
      let mediaUrl=null;
      if(file){
        const cf=await compressImage(file);
        const ext=cf.type==='image/jpeg'?'jpg':file.name.split('.').pop();
        const path=`${S.user.id}/${Date.now()}.${ext}`;
        const {error:ue}=await sb.storage.from('media').upload(path,cf,{cacheControl:'3600'});
        if(!ue){const {data:{publicUrl}}=sb.storage.from('media').getPublicUrl(path);mediaUrl=publicUrl;}
      }
      await sb.from('posts').insert({user_id:S.user.id,content:content.trim(),media_url:mediaUrl,media_type:mtype});
      ta.value='';content='';file=null;mtype=null;prevContainer.innerHTML='';
      counter.textContent=String(MAX_POST);counter.className='compose-counter';
      submitBtn.textContent='Post';toast('Post shared! ✨','success');
      await loadPosts();render();
    }catch(err){toast('Failed: '+err.message,'error');submitBtn.disabled=false;submitBtn.textContent='Post';}
  };
  footer.appendChild(submitBtn);
  right.appendChild(footer);
  bar.appendChild(right);
  return bar;
}

// ═══════════════════════════════════════════════════════════════════════
//  POST CARD
// ═══════════════════════════════════════════════════════════════════════
function renderPost(post){
  const prof=S.profiles.find(p=>p.id===post.user_id)||{username:'unknown',avatar_color:'#888',display_name:'Unknown'};
  const isLiked=S.postLikes.has(post.id);
  const isSaved=S.saved.has(post.id);
  const card=mk('div',{class:'post-card'});

  // Header
  const hd=mk('div',{class:'post-header'});
  const avWrap=mk('div',{class:'post-av-wrap'});
  const av=buildAv(prof,36,'post-av');
  av.style.cursor='pointer'; av.onclick=()=>goProfile(prof.id);
  avWrap.appendChild(av);
  hd.appendChild(avWrap);
  const meta=mk('div',{class:'post-meta'});
  const ar=mk('div',{class:'post-author-row'});
  const auth=mk('span',{class:'post-author',text:prof.display_name||prof.username});
  auth.onclick=()=>goProfile(prof.id);
  ar.appendChild(auth);
  if(prof.username)ar.appendChild(mk('span',{class:'post-handle',text:'@'+prof.username}));
  meta.appendChild(ar);
  hd.appendChild(meta);
  hd.appendChild(mk('span',{class:'post-time',text:timeAgo(post.created_at)}));
  const moreBtn=mk('button',{class:'post-more-btn'});
  moreBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.2"/><circle cx="12" cy="12" r="1.2"/><circle cx="12" cy="19" r="1.2"/></svg>`;
  moreBtn.onclick=e=>openCtxMenu(e,post);
  hd.appendChild(moreBtn);
  card.appendChild(hd);

  // Media
  if(post.media_url){
    const mw=mk('div',{class:'post-media-wrap'});
    let dblTimer=null;
    if(post.media_type==='video'){
      const vid=document.createElement('video');
      vid.src=post.media_url;vid.className='post-video';vid.controls=true;vid.playsInline=true;vid.preload='metadata';
      mw.appendChild(vid);
    } else {
      const img=document.createElement('img');
      img.src=post.media_url;img.className='post-img';img.loading='lazy';img.alt='';
      img.addEventListener('click',()=>{
        if(dblTimer){clearTimeout(dblTimer);dblTimer=null;showHeart(mw);if(!S.postLikes.has(post.id))doLikePost(post,card);}
        else dblTimer=setTimeout(()=>{dblTimer=null;S.lightbox={url:post.media_url,type:'image'};render();},280);
      });
      mw.appendChild(img);
    }
    card.appendChild(mw);
  }

  // Actions
  const acts=mk('div',{class:'post-actions'});
  const likeBtn=mk('button',{class:'post-act-btn'+(isLiked?' liked':'')});
  likeBtn.innerHTML=isLiked
    ?`<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
    :`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  likeBtn.onclick=()=>doLikePost(post,card);
  acts.appendChild(likeBtn);

  const cmtBtn=mk('button',{class:'post-act-btn'});
  cmtBtn.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
  cmtBtn.onclick=()=>openComments(post.id);
  acts.appendChild(cmtBtn);

  const shareBtn=mk('button',{class:'post-act-btn'});
  shareBtn.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
  shareBtn.onclick=()=>sharePost(post);
  acts.appendChild(shareBtn);

  const saveBtn=mk('button',{class:'post-act-btn post-act-save'+(isSaved?' saved':'')});
  saveBtn.innerHTML=isSaved
    ?`<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`
    :`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
  saveBtn.onclick=()=>doSave(post,saveBtn);
  acts.appendChild(saveBtn);
  card.appendChild(acts);

  // Likes
  const lc=post.like_count||0;
  if(lc>0){
    const le=mk('div',{class:'post-likes',text:fmtCount(lc)+(lc===1?' like':' likes')});
    card.appendChild(le);
  }

  // Caption
  if(post.content){
    const cap=mk('div',{class:'post-caption'});
    const ca=mk('span',{class:'post-caption-author',text:prof.username||prof.display_name});
    ca.onclick=()=>goProfile(prof.id); cap.appendChild(ca);
    const MAX=120;
    if(post.content.length>MAX){
      const st=document.createElement('span');
      st.innerHTML=' '+parseContent(post.content.slice(0,MAX));
      cap.appendChild(st);
      const ml=mk('a',{class:'post-caption-more',text:'...more'});
      let ex=false;
      ml.onclick=()=>{if(!ex){st.innerHTML=' '+parseContent(post.content);ml.style.display='none';ex=true;}};
      cap.appendChild(ml);
    } else {
      const st=document.createElement('span');
      st.innerHTML=' '+parseContent(post.content);
      cap.appendChild(st);
    }
    card.appendChild(cap);
  }

  // Comment count
  const cc=post.comment_count||0;
  if(cc>0){
    const vc=mk('div',{class:'post-view-comments',text:`View all ${fmtCount(cc)} comment${cc===1?'':'s'}`});
    vc.onclick=()=>openComments(post.id);
    card.appendChild(vc);
  }

  // Add comment row
  const acr=mk('div',{class:'post-add-comment'});
  acr.appendChild(buildAv(S.profile,26,'post-comment-av'));
  const ci=mk('input',{class:'post-comment-inp',placeholder:'Add a comment...',type:'text'});
  const cs=mk('button',{class:'post-comment-send',text:'Post'});
  cs.disabled=true;
  ci.oninput=()=>{const v=ci.value.trim().length>0;cs.className='post-comment-send'+(v?' visible':'');cs.disabled=!v;};
  ci.onkeydown=e=>{if(e.key==='Enter')cs.click();};
  cs.onclick=async()=>{
    const txt=ci.value.trim();if(!txt)return;
    cs.disabled=true;
    await submitComment(post.id,null,txt);
    ci.value='';cs.className='post-comment-send';
    post.comment_count=(post.comment_count||0)+1;
    const vc2=card.querySelector('.post-view-comments');
    if(vc2)vc2.textContent=`View all ${fmtCount(post.comment_count)} comments`;
  };
  acr.appendChild(ci);acr.appendChild(cs);
  card.appendChild(acr);
  return card;
}

function showHeart(container){
  const a=mk('div',{class:'heart-anim'});
  a.appendChild(mk('span',{class:'heart-anim-icon',text:'❤️'}));
  container.appendChild(a);setTimeout(()=>a.remove(),900);
}

async function doLikePost(post,cardEl){
  const liked=S.postLikes.has(post.id);
  if(liked){
    await sb.from('likes').delete().eq('user_id',S.user.id).eq('post_id',post.id);
    S.postLikes.delete(post.id);post.like_count=Math.max(0,(post.like_count||1)-1);
  } else {
    await sb.from('likes').insert({user_id:S.user.id,post_id:post.id});
    S.postLikes.add(post.id);post.like_count=(post.like_count||0)+1;
    if(post.user_id!==S.user.id)await sb.from('notifications').insert({user_id:post.user_id,from_id:S.user.id,type:'like',post_id:post.id});
  }
  if(!cardEl)return;
  const lb=cardEl.querySelector('.post-act-btn:first-child');
  const le=cardEl.querySelector('.post-likes');
  const nowLiked=S.postLikes.has(post.id);
  if(lb){
    lb.className='post-act-btn'+(nowLiked?' liked animate':'');
    lb.innerHTML=nowLiked
      ?`<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
      :`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
    setTimeout(()=>lb.classList.remove('animate'),400);
  }
  if(le){const c=post.like_count;if(c>0)le.textContent=fmtCount(c)+(c===1?' like':' likes');else le.remove();}
}

async function doSave(post,btn){
  const saved=S.saved.has(post.id);
  if(saved){
    S.saved.delete(post.id);
    if(btn){btn.className='post-act-btn post-act-save';btn.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;}
    toast('Removed from saved');
  } else {
    S.saved.add(post.id);
    if(btn){btn.className='post-act-btn post-act-save saved';btn.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;}
    toast('Saved ✅','success');
  }
}

async function sharePost(post){
  const url=window.location.origin+'?p='+post.id;
  if(navigator.clipboard)await navigator.clipboard.writeText(url);
  toast('Link copied! 🔗','success');
}

function openCtxMenu(e,post){
  e.stopPropagation();
  S.ctxMenu={type:'post',post,x:e.clientX,y:e.clientY};
  render();
}

function renderCtxMenu(){
  const m=S.ctxMenu;
  const el=mk('div',{class:'context-menu'});
  el.style.left=Math.min(m.x,window.innerWidth-200)+'px';
  el.style.top=Math.min(m.y,window.innerHeight-260)+'px';
  const close=()=>{S.ctxMenu=null;el.remove();};
  document.addEventListener('click',close,{once:true});
  if(m.type==='post'){
    const post=m.post;
    [{ico:'🔗',txt:'Copy link',fn:()=>sharePost(post)},
     {ico:'🔖',txt:S.saved.has(post.id)?'Unsave':'Save',fn:()=>doSave(post,null)},
     ...(post.user_id===S.user.id?[{ico:'🗑️',txt:'Delete',danger:true,fn:async()=>{await deletePost(post.id);close();}}]:[{ico:'🚩',txt:'Report',fn:()=>toast('Reported. Thanks.')}])
    ].forEach(item=>{
      const btn=mk('button',{class:'context-menu-item'+(item.danger?' danger':'')});
      btn.innerHTML=`<span>${item.ico}</span>${item.txt}`;
      btn.onclick=()=>{item.fn();close();};
      el.appendChild(btn);
    });
  }
  return el;
}

async function deletePost(id){
  await sb.from('posts').delete().eq('id',id);
  S.posts=S.posts.filter(p=>p.id!==id);render();
}

// ═══════════════════════════════════════════════════════════════════════
//  COMMENTS
// ═══════════════════════════════════════════════════════════════════════
function openComments(postId,reelId=null){
  S.commentsOpen={postId,reelId};
  const key=postId||reelId;
  if(!S.comments[key])loadComments(postId,reelId).then(()=>render());
  else render();
}

async function loadComments(postId,reelId){
  const key=postId||reelId;
  let q=sb.from('comments').select('*').order('created_at');
  if(postId)q=q.eq('post_id',postId);
  else if(reelId)q=q.eq('reel_id',reelId);
  const {data}=await q;
  S.comments[key]=data||[];
}

async function submitComment(postId,reelId,text){
  const row=postId?{post_id:postId,user_id:S.user.id,content:text}:{reel_id:reelId,user_id:S.user.id,content:text};
  const {data}=await sb.from('comments').insert(row).select().single();
  const key=postId||reelId;
  if(!S.comments[key])S.comments[key]=[];
  if(data)S.comments[key].push(data);
  const tp=S.posts.find(p=>p.id===postId);if(tp)tp.comment_count=(tp.comment_count||0)+1;
  const tr=S.reels.find(r=>r.id===reelId);if(tr)tr.comment_count=(tr.comment_count||0)+1;
  const oid=S.posts.find(p=>p.id===postId)?.user_id||S.reels.find(r=>r.id===reelId)?.user_id;
  if(oid&&oid!==S.user.id)await sb.from('notifications').insert({user_id:oid,from_id:S.user.id,type:'comment',post_id:postId,reel_id:reelId});
}

      item.appendChild(av);
      const body=mk('div',{class:'comment-body'});
      const txt=mk('div',{class:'comment-text'});
      const au=mk('span',{class:'comment-author',text:prof.username||prof.display_name});
      au.onclick=()=>{S.commentsOpen=null;goProfile(prof.id);};
      txt.appendChild(au);
      const ct=document.createElement('span');
      ct.innerHTML=' '+parseContent(c.content);
      txt.appendChild(ct);body.appendChild(txt);
      const meta=mk('div',{class:'comment-meta'});
      meta.appendChild(mk('span',{class:'comment-time',text:timeAgo(c.created_at)}));
      if(c.user_id===S.user.id){
        const del=mk('button',{class:'comment-delete-btn',text:'Delete'});
        del.onclick=async()=>{await sb.from('comments').delete().eq('id',c.id);S.comments[key]=S.comments[key].filter(x=>x.id!==c.id);render();};
        meta.appendChild(del);
      }
      body.appendChild(meta);item.appendChild(body);list.appendChild(item);
    });
  }
  sheet.appendChild(list);
  const ia=mk('div',{class:'comment-input-area'});
  ia.appendChild(buildAv(S.profile,30,'comment-input-av'));
  const iw=mk('div',{class:'comment-input-wrap'});
  const ta=mk('textarea',{class:'comment-input-ta',placeholder:'Add a comment...'});
  ta.rows=1;
  ta.oninput=e=>{cmtText=e.target.value;ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,100)+'px';sendBtn.disabled=!ta.value.trim();};
  ta.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendBtn.click();}};
  const ar=mk('div',{class:'comment-input-actions'});
  const eBtn=mk('button',{class:'comment-emoji-btn',text:'😊'});
  eBtn.onclick=e=>{
    e.stopPropagation();
    const ex=qs('.emoji-picker');if(ex){ex.remove();return;}
    const picker=buildEmojiPicker(em=>{ta.value+=em;cmtText=ta.value;picker.remove();});
    iw.appendChild(picker);document.addEventListener('click',()=>picker.remove(),{once:true});
  };
  ar.appendChild(eBtn);
  const sendBtn=mk('button',{class:'comment-send-btn',text:'Post'});
  sendBtn.disabled=true;
  sendBtn.onclick=async()=>{
    const txt=ta.value.trim();if(!txt)return;
    sendBtn.disabled=true;
    await submitComment(postId,reelId,txt);
    ta.value='';ta.style.height='auto';
    list.innerHTML='';
    (S.comments[key]||[]).forEach(c=>{
      const prof=S.profiles.find(p=>p.id===c.user_id)||{username:'unknown',avatar_color:'#888'};
      const item=mk('div',{class:'comment-item'});
      const av2=buildAv(prof,32,'comment-av');

  ar.appendChild(sendBtn);

function renderReelsView(){
  const view=mk('div',{class:'reels-view'});
  const scroll=mk('div',{class:'reels-scroll'});
  if(S.reels.length===0){
    const emp=mk('div',{class:'empty-state',style:'height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center'});

    const ab=mk('button',{class:'empty-state-btn',text:'+ Post Reel',onclick:()=>{S.modal={type:'reel'};render();}});
    emp.appendChild(ab);scroll.appendChild(emp);view.appendChild(scroll);return view;
  }
  [...S.reels].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(reel=>{
    const item=mk('div',{class:'reel-item'});
    item.dataset.rid=reel.id;

      iframe.setAttribute('allow','autoplay;clipboard-write;encrypted-media;picture-in-picture;web-share');
      item.appendChild(iframe);
    } else if(reel.video_url){
      const vid=document.createElement('video');
      vid.src=reel.video_url;vid.className='reel-video';
      vid.loop=true;vid.playsInline=true;vid.muted=false;vid.preload='metadata';
      item.appendChild(vid);
      const obs=new IntersectionObserver(entries=>{
        entries.forEach(en=>{
          if(en.isIntersecting){vid.play().catch(()=>{vid.muted=true;vid.play().catch(()=>{});});}
          else vid.pause();
        });
      },{threshold:.6});
      obs.observe(item);iObservers.push(obs);
    }
    item.appendChild(mk('div',{class:'reel-gradient-top'}));
    item.appendChild(mk('div',{class:'reel-gradient-bottom'}));
    const prof=S.profiles.find(p=>p.id===reel.user_id)||{username:'unknown',avatar_color:'#888'};
    const bottom=mk('div',{class:'reel-bottom'});
    const ur=mk('div',{class:'reel-user-row'});
    const rav=buildAv(prof,36,'reel-av');rav.style.cursor='pointer';rav.onclick=()=>goProfile(prof.id);
    ur.appendChild(rav);
    const uname=mk('span',{class:'reel-uname',text:'@'+(prof.username||prof.display_name)});
    uname.onclick=()=>goProfile(prof.id);ur.appendChild(uname);
    const myF=new Set(S.follows.filter(f=>f.follower_id===S.profile?.id).map(f=>f.following_id));
    if(reel.user_id!==S.profile?.id){
      const isF=myF.has(reel.user_id);
      const fb=mk('button',{class:'reel-follow-inline'+(isF?' following':''),text:isF?'Following':'Follow'});
      fb.onclick=async()=>{await handleFollow(reel.user_id);render();};
      ur.appendChild(fb);
    }
    bottom.appendChild(ur);
    if(reel.caption){const cap=mk('div',{class:'reel-caption'});cap.innerHTML=parseContent(reel.caption);bottom.appendChild(cap);}
    const audio=mk('div',{class:'reel-audio'});
    audio.innerHTML=`<div class="reel-audio-disc"></div><span>Original audio</span>`;
    bottom.appendChild(audio);item.appendChild(bottom);

    const side=mk('div',{class:'reel-side-actions'});
    const isLiked=S.reelLikes.has(reel.id);
    side.appendChild(buildAv(prof,44,'reel-act-av-btn'));

    const la=mk('div',{class:'reel-act'});
    const lb=mk('button',{class:'reel-act-btn'+(isLiked?' liked':'')});
    lb.innerHTML=`<svg viewBox="0 0 24 24" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
    lb.onclick=async()=>doLikeReel(reel,item);
    la.appendChild(lb);la.appendChild(mk('span',{class:'reel-act-label',text:fmtCount(reel.like_count||0)}));
    side.appendChild(la);

    const ca=mk('div',{class:'reel-act'});
    const cb2=mk('button',{class:'reel-act-btn'});
    cb2.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
    cb2.onclick=()=>openComments(null,reel.id);
    ca.appendChild(cb2);ca.appendChild(mk('span',{class:'reel-act-label',text:fmtCount(reel.comment_count||0)}));
    side.appendChild(ca);

    const sa=mk('div',{class:'reel-act'});
    const sb3=mk('button',{class:'reel-act-btn'});
    sb3.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
    sb3.onclick=()=>sharePost(reel);
    sa.appendChild(sb3);sa.appendChild(mk('span',{class:'reel-act-label',text:'Share'}));
    side.appendChild(sa);

    if(reel.user_id===S.profile?.id){
      const da=mk('div',{class:'reel-act'});
      const db=mk('button',{class:'reel-act-btn'});
      db.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>`;
      db.onclick=async()=>{await sb.from('reels').delete().eq('id',reel.id);S.reels=S.reels.filter(r=>r.id!==reel.id);render();};
      da.appendChild(db);da.appendChild(mk('span',{class:'reel-act-label',text:'Delete'}));
      side.appendChild(da);
    }
    item.appendChild(side);
    scroll.appendChild(item);
  });
  const fab=mk('button',{style:'position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 16px rgba(99,102,241,.4);transition:all .18s'});
  fab.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>`;
  fab.onmouseover=()=>fab.style.transform='scale(1.1)';fab.onmouseout=()=>fab.style.transform='scale(1)';
  fab.onclick=()=>{S.modal={type:'reel'};render();};
  scroll.appendChild(fab);
  view.appendChild(scroll);return view;
}

async function doLikeReel(reel,itemEl){
  const liked=S.reelLikes.has(reel.id);
  if(liked){
    await sb.from('likes').delete().eq('user_id',S.user.id).eq('reel_id',reel.id);
    S.reelLikes.delete(reel.id);reel.like_count=Math.max(0,(reel.like_count||1)-1);
  } else {
    await sb.from('likes').insert({user_id:S.user.id,reel_id:reel.id});
    S.reelLikes.add(reel.id);reel.like_count=(reel.like_count||0)+1;
    if(reel.user_id!==S.user.id)await sb.from('notifications').insert({user_id:reel.user_id,from_id:S.user.id,type:'reel',reel_id:reel.id});
    const anim=mk('div',{class:'reel-like-anim'});
    anim.appendChild(mk('span',{class:'reel-like-heart',text:'❤️'}));
    itemEl.appendChild(anim);setTimeout(()=>anim.remove(),1000);
  }
  const lb=itemEl.querySelector('.reel-act-btn');
  const ll=lb?.parentElement?.querySelector('.reel-act-label');
  const nowLiked=S.reelLikes.has(reel.id);
  if(lb){lb.className='reel-act-btn'+(nowLiked?' liked':'');lb.innerHTML=`<svg viewBox="0 0 24 24" fill="${nowLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;}
  if(ll)ll.textContent=fmtCount(reel.like_count||0);
}

//  STORY VIEWER
// ═══════════════════════════════════════════════════════════════════════
function openStoryViewer(stories,idx){
  if(storyTimer)clearTimeout(storyTimer);
  S.storyViewer={stories,idx};render();startStoryTimer();
}
function startStoryTimer(){
  if(storyTimer)clearTimeout(storyTimer);
  storyTimer=setTimeout(()=>advStory(1),STORY_DURATION);
}
function advStory(dir){
  if(!S.storyViewer)return;
  const {stories,idx}=S.storyViewer;
  const ni=idx+dir;
  if(ni>=stories.length||ni<0){closeStory();return;}
  S.storyViewer={stories,idx:ni};render();startStoryTimer();
}
function closeStory(){
  if(storyTimer)clearTimeout(storyTimer);
  S.storyViewer=null;render();
}

function renderStoryViewer(){
  const {stories,idx}=S.storyViewer;
  const story=stories[idx];
  const prof=S.profiles.find(p=>p.id===story.user_id)||{username:'unknown',avatar_color:'#888'};
  const overlay=mk('div',{class:'story-viewer-overlay'});
  overlay.onclick=e=>{if(e.target===overlay)closeStory();};
  const viewer=mk('div',{class:'story-viewer'});
  const mw=mk('div',{class:'sv-media-wrap'});
  if(story.media_type==='video'){
    const vid=document.createElement('video');
    vid.src=story.media_url;vid.className='sv-video';vid.autoplay=true;vid.playsInline=true;vid.muted=S.storyMuted;
    vid.onended=()=>advStory(1);mw.appendChild(vid);
  } else {
    const img=document.createElement('img');img.src=story.media_url;img.className='sv-img';mw.appendChild(img);
  }
  viewer.appendChild(mw);
  viewer.appendChild(mk('div',{class:'sv-gradient-top'}));
  viewer.appendChild(mk('div',{class:'sv-gradient-bottom'}));
  const pbs=mk('div',{class:'sv-progress-bars'});
  stories.forEach((_,i)=>{
    const bar=mk('div',{class:'sv-progress-bar'});
    const fill=mk('div',{class:'sv-progress-fill'+(i===idx?' animating':i<idx?' done':'')});
    if(i===idx)fill.style.setProperty('--duration',(STORY_DURATION/1000)+'s');
    bar.appendChild(fill);pbs.appendChild(bar);
  });
  viewer.appendChild(pbs);
  const hd=mk('div',{class:'sv-header'});
  hd.appendChild(buildAv(prof,32,'sv-av'));
  const sm=mk('div',{class:'sv-meta'});
  sm.appendChild(mk('div',{class:'sv-uname',text:prof.username||prof.display_name}));
  sm.appendChild(mk('div',{class:'sv-time',text:timeAgo(story.created_at)}));
  hd.appendChild(sm);
  const sat=mk('div',{class:'sv-actions-top'});
  const muteBtn=mk('button',{class:'sv-mute-btn'});
  muteBtn.innerHTML=S.storyMuted?`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
  muteBtn.onclick=e=>{e.stopPropagation();S.storyMuted=!S.storyMuted;render();};
  const closeBtn=mk('button',{class:'sv-close-btn'});
  closeBtn.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  closeBtn.onclick=closeStory;
  sat.appendChild(muteBtn);sat.appendChild(closeBtn);hd.appendChild(sat);viewer.appendChild(hd);
  const tl=mk('div',{class:'sv-tap-left'});tl.onclick=()=>advStory(-1);
  const tr=mk('div',{class:'sv-tap-right'});tr.onclick=()=>advStory(1);
  viewer.appendChild(tl);viewer.appendChild(tr);
  const foot=mk('div',{class:'sv-footer'});
  const ri=mk('input',{class:'sv-reply-inp',placeholder:`Reply to ${prof.username||'story'}...`,type:'text'});
  ri.onclick=e=>e.stopPropagation();
  foot.appendChild(ri);
  const sl=mk('button',{class:'sv-like-btn'});
  sl.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  foot.appendChild(sl);viewer.appendChild(foot);
  if(idx>0){const np=mk('button',{class:'sv-nav-prev'});np.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>`;np.onclick=e=>{e.stopPropagation();advStory(-1);};viewer.appendChild(np);}
  if(idx<stories.length-1){const nn=mk('button',{class:'sv-nav-next'});nn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>`;nn.onclick=e=>{e.stopPropagation();advStory(1);};viewer.appendChild(nn);}
  overlay.appendChild(viewer);return overlay;
}
