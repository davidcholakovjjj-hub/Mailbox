<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mailbox</title>
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0e0f11;--bg1:#161719;--bg2:#1e1f22;--bg3:#27282c;
  --border:#2e2f34;--border2:#3a3b42;
  --text:#e8e9ec;--text2:#9a9ba6;--text3:#5c5d68;
  --accent:#5b7fff;--accent2:#7b96ff;
  --red:#f46b6b;--green:#3ecf8e;--amber:#f5a623;
  --r:10px;--rs:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--text);height:100vh;overflow:hidden}
#root{height:100vh;display:flex;flex-direction:column}

/* ── LOADING ── */
.loading{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--text3)}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── AUTH ── */
.auth-screen{flex:1;display:flex;align-items:center;justify-content:center}
.auth-card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:40px;width:460px;max-width:95vw}
.logo{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;margin-bottom:4px}
.logo span{color:var(--accent)}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:8px;background:none;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s}
.tab.active{background:var(--bg3);border-color:var(--border2);color:var(--text)}
label.lbl{font-size:12px;color:var(--text2);display:block;margin-bottom:5px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none;margin-bottom:12px;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.urow{display:flex;margin-bottom:12px}
.urow .inp{margin-bottom:0;border-radius:var(--rs) 0 0 var(--rs);border-right:none;flex:1}
.dsel{background:var(--bg2);border:1px solid var(--border);border-radius:0 var(--rs) var(--rs) 0;padding:10px 10px;font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);outline:none;cursor:pointer;min-width:155px}
.dsel option{background:var(--bg2)}
.btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;margin-top:4px}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.err{font-size:12px;color:var(--red);background:#2d1515;border:1px solid #5c2222;border-radius:var(--rs);padding:8px 12px;margin-bottom:10px}
.ok{font-size:12px;color:var(--green);background:#132415;border:1px solid #1e4d24;border-radius:var(--rs);padding:8px 12px;margin-bottom:10px}
.divider{text-align:center;font-size:12px;color:var(--text3);margin:14px 0}

/* domain section */
.dsec{margin-top:18px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.dsec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.dpills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.dpill{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);cursor:pointer;transition:all .1s}
.dpill:hover{border-color:var(--accent)}
.dpill.sel{border-color:var(--accent);color:var(--accent);background:#0e1a3a}
.dpill-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;line-height:1;padding:0}
.dpill-x:hover{color:var(--red)}
.dadd-row{display:flex;gap:8px}
.dadd-inp{flex:1;background:var(--bg0);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);outline:none}
.dadd-inp:focus{border-color:var(--accent)}
.dadd-inp::placeholder{color:var(--text3)}
.dadd-btn{padding:8px 14px;background:var(--accent);border:none;border-radius:var(--rs);font-family:inherit;font-size:12px;color:#fff;cursor:pointer;font-weight:500;white-space:nowrap}
.dadd-btn:hover{background:var(--accent2)}
.dhint{font-size:11px;color:var(--text3);margin-top:8px}

/* ── APP LAYOUT ── */
.app{display:flex;height:100%;overflow:hidden}
.sidebar{width:220px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.sb-logo{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.sb-logo span{color:var(--accent)}
.sb-addr{font-size:11px;color:var(--text2);margin-top:3px;font-family:'DM Mono',monospace;word-break:break-all}
.compose-btn{margin:10px 14px;padding:9px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer}
.compose-btn:hover{background:var(--accent2)}
.nav{padding:6px 0;flex:1;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:8px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .1s;position:relative}
.ni:hover{background:var(--bg2);color:var(--text)}
.ni.active{background:var(--bg3);color:var(--text)}
.ni svg{width:14px;height:14px;flex-shrink:0;opacity:.7}
.ni.active svg{opacity:1}
.nbadge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border)}
.so-btn{width:100%;padding:8px;background:none;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:12px;color:var(--text3);cursor:pointer}
.so-btn:hover{color:var(--red);border-color:var(--red)}

.email-list{width:310px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.el-head{padding:12px 16px;border-bottom:1px solid var(--border)}
.el-title{font-size:14px;font-weight:600;margin-bottom:8px}
.search{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:7px 12px;font-family:inherit;font-size:13px;color:var(--text);outline:none}
.search::placeholder{color:var(--text3)}
.search:focus{border-color:var(--accent)}
.el-body{overflow-y:auto;flex:1}
.eitem{padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative}
.eitem:hover{background:var(--bg1)}
.eitem.active{background:var(--bg2)}
.eitem.unread::before{content:'';position:absolute;left:7px;top:50%;transform:translateY(-50%);width:5px;height:5px;background:var(--accent);border-radius:50%}
.ei-r1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.ei-from{font-size:13px;color:var(--text2)}
.eitem.unread .ei-from{font-weight:600;color:var(--text)}
.ei-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.ei-sub{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ei-prev{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.etag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;margin-top:5px}
.etag-work{background:#1e2d4a;color:#7b96ff}
.etag-personal{background:#1a2e24;color:#3ecf8e}
.etag-promo{background:#2d2010;color:#f5a623}
.empty-list{padding:28px 16px;text-align:center;color:var(--text3);font-size:13px}

.ev{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ev-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3)}
.ev-empty svg{opacity:.15;width:44px;height:44px}
.ev-head{padding:22px 28px 14px;border-bottom:1px solid var(--border)}
.ev-subj{font-size:19px;font-weight:600;margin-bottom:12px;line-height:1.3}
.ev-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ev-av{width:34px;height:34px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent);flex-shrink:0;font-family:'DM Mono',monospace}
.ev-si{flex:1}
.ev-fn{font-size:13px;font-weight:500}
.ev-fa{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace}
.ev-t{font-size:12px;color:var(--text3)}
.ev-acts{display:flex;gap:6px}
.ev-btn{padding:5px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:12px;color:var(--text2);cursor:pointer;transition:all .1s}
.ev-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.ev-body{padding:22px 28px;flex:1;overflow-y:auto;font-size:14px;line-height:1.8;color:var(--text2);white-space:pre-wrap;word-break:break-word}

/* ── COMPOSE ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:flex-end;padding:18px;z-index:200}
.cmodal{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r);width:500px;display:flex;flex-direction:column;overflow:hidden;max-height:500px}
.cm-head{padding:12px 14px;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.cm-title{font-size:13px;font-weight:600}
.cm-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1}
.cm-x:hover{color:var(--text)}
.cm-field{display:flex;align-items:center;border-bottom:1px solid var(--border);padding:9px 14px;gap:8px}
.cm-lbl{font-size:12px;color:var(--text3);width:32px;flex-shrink:0}
.cm-inp{flex:1;background:none;border:none;font-family:inherit;font-size:13px;color:var(--text);outline:none}
.cm-inp::placeholder{color:var(--text3)}
.cm-body{flex:1;padding:12px 14px;min-height:160px;background:none;border:none;font-family:inherit;font-size:13px;color:var(--text);outline:none;resize:none;line-height:1.7}
.cm-body::placeholder{color:var(--text3)}
.cm-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.send-btn{padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer}
.send-btn:hover{background:var(--accent2)}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.disc-btn{padding:8px 12px;background:none;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:13px;color:var(--text2);cursor:pointer}
.disc-btn:hover{border-color:var(--red);color:var(--red)}
.cm-from{margin-left:auto;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:9px 18px;font-size:13px;color:var(--text);z-index:300;animation:sup .2s ease;white-space:nowrap;pointer-events:none}
@keyframes sup{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── REALTIME DOT ── */
.rt-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  ⚙️  CONFIGURATION — replace with your Supabase credentials
//  Get them from: Supabase Dashboard → Project → Settings → API
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://YOUR_PROJECT_ID.supabase.co';
const SUPABASE_ANON = 'YOUR_ANON_PUBLIC_KEY';
// ═══════════════════════════════════════════════════════════

const FREE_DOMAINS = ['@mailbox.io','@fastpost.net','@swiftmail.org','@clearpost.me','@inboxly.com'];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── helpers ──────────────────────────────────────────────
const el = (tag, attrs={}, ...kids) => {
  const d = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==='class')d.className=v;
    else if(k.startsWith('on'))d.addEventListener(k.slice(2).toLowerCase(),v);
    else d.setAttribute(k,v);
  }
  kids.forEach(k=>d.appendChild(typeof k==='string'?document.createTextNode(k):k));
  return d;
};
const qs = s => document.querySelector(s);

let toastTimer;
function toast(msg){
  const old=qs('.toast');if(old)old.remove();clearTimeout(toastTimer);
  const t=el('div',{class:'toast'},msg);
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>t.remove(),2600);
}

function fmtTime(ts){
  const d=new Date(ts), now=new Date();
  if(d.toDateString()===now.toDateString())
    return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const diff=(now-d)/864e5;
  if(diff<7) return d.toLocaleDateString([],{weekday:'short'});
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}

// ── STATE ────────────────────────────────────────────────
let state = {
  user: null, profile: null,
  folder: 'inbox', emails: [],
  selected: null, composing: false,
  search: '', loading: true,
  replyTo: null, replySub: '',
};
let realtimeSub = null;

// ── RENDER ───────────────────────────────────────────────
function render(){
  const root=qs('#root'); root.innerHTML='';
  if(state.loading){ root.appendChild(renderLoading()); return; }
  if(!state.user){   root.appendChild(renderAuth());    return; }
  root.appendChild(renderApp());
}

function renderLoading(){
  const w=el('div',{class:'loading'});
  w.appendChild(el('div',{class:'spinner'}));
  w.appendChild(el('span',{},'Loading mailbox...'));
  return w;
}

// ── AUTH ──────────────────────────────────────────────────────────────
function renderAuth(){
  let tab='login', domain=FREE_DOMAINS[0], domains=[...FREE_DOMAINS];
  let username='', realEmail='', password='', confirm='', customInp='';

  const screen=el('div',{class:'auth-screen'});
  const card=el('div',{class:'auth-card'});
  screen.appendChild(card);

  function rebuild(){
    card.innerHTML='';
    const logo=el('div',{class:'logo'},'mail'); logo.appendChild(el('span',{},'box')); card.appendChild(logo);
    card.appendChild(el('div',{class:'auth-sub'},'Free & custom domain email — forever free.'));

    const tabs=el('div',{class:'tabs'});
    ['login','create'].forEach(t=>{
      const b=el('button',{class:'tab'+(tab===t?' active':'')},t==='login'?'Sign in':'Create account');
      b.onclick=()=>{tab=t;rebuild();};
      tabs.appendChild(b);
    });
    card.appendChild(tabs);

    const msgArea=el('div',{id:'auth-msg'});
    card.appendChild(msgArea);
    function showErr(m){msgArea.innerHTML='';msgArea.appendChild(el('div',{class:'err'},m));}
    function showOk(m){msgArea.innerHTML='';msgArea.appendChild(el('div',{class:'ok'},m));}

    if(tab==='create'){
      // Mailbox address picker
      card.appendChild(el('label',{class:'lbl'},'Your mailbox address'));
      const urow=el('div',{class:'urow'});
      const uinp=el('input',{class:'inp',placeholder:'yourname',value:username});
      uinp.oninput=e=>username=e.target.value;
      const dsel=el('select',{class:'dsel'});
      domains.forEach(d=>{const o=el('option',{value:d},d);if(d===domain)o.selected=true;dsel.appendChild(o);});
      dsel.onchange=e=>domain=e.target.value;
      urow.appendChild(uinp); urow.appendChild(dsel); card.appendChild(urow);

      // Domain pills — no rebuild on interaction, update DOM directly
      const dsec=el('div',{class:'dsec',style:'margin-bottom:14px'});
      const dpills=el('div',{class:'dpills',id:'dpills-container'});

      function renderPills(){
        dpills.innerHTML='';
        domains.forEach(d=>{
          const pill=el('div',{class:'dpill'+(d===domain?' sel':'')},d);
          pill.onclick=()=>{
            domain=d;
            if(dsel)dsel.value=d;
            renderPills();
          };
          if(!FREE_DOMAINS.includes(d)){
            const x=el('button',{class:'dpill-x'},'×');
            x.onclick=e=>{
              e.stopPropagation();
              domains=domains.filter(i=>i!==d);
              if(domain===d)domain=domains[0];
              renderPills();
            };
            pill.appendChild(x);
          }
          dpills.appendChild(pill);
        });
      }
      renderPills();
      dsec.appendChild(dpills);

      const darow=el('div',{class:'dadd-row'});
      const dainp=document.createElement('input');
      dainp.className='dadd-inp';
      dainp.placeholder='type domain e.g. mycompany.com';
      dainp.type='text';
      dainp.autocomplete='off';
      dainp.spellcheck=false;

      const dabtn=el('button',{class:'dadd-btn'},'+ Add');
      dabtn.type='button';
      dabtn.onclick=()=>{
        let d=dainp.value.trim();
        if(!d)return;
        if(!d.startsWith('@'))d='@'+d;
        if(!/^@[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/.test(d)){showErr('Invalid domain. Example: mycompany.com');return;}
        if(!domains.includes(d))domains.push(d);
        domain=d;
        if(dsel){
          const o=el('option',{value:d},d);
          dsel.appendChild(o);
          dsel.value=d;
        }
        dainp.value='';
        renderPills();
      };
      dainp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();dabtn.click();}};
      darow.appendChild(dainp);darow.appendChild(dabtn);dsec.appendChild(darow);
      dsec.appendChild(el('div',{class:'dhint'},'This is your in-app email address e.g. yourname@mycompany.com'));
      card.appendChild(dsec);

      // Real email for auth
      card.appendChild(el('label',{class:'lbl'},'Your real email (used to log in)'));
      const reinp=el('input',{class:'inp',type:'email',placeholder:'your@gmail.com',value:realEmail});
      reinp.oninput=e=>realEmail=e.target.value;
      card.appendChild(reinp);
    } else {
      card.appendChild(el('label',{class:'lbl'},'Login email'));
      const reinp=el('input',{class:'inp',type:'email',placeholder:'your@gmail.com',value:realEmail});
      reinp.oninput=e=>realEmail=e.target.value;
      card.appendChild(reinp);
    }

    card.appendChild(el('label',{class:'lbl'},'Password'));
    const pinp=el('input',{class:'inp',type:'password',placeholder:tab==='login'?'Enter password':'Create a password',value:password});
    pinp.oninput=e=>password=e.target.value;
    card.appendChild(pinp);

    if(tab==='create'){
      card.appendChild(el('label',{class:'lbl'},'Confirm password'));
      const cinp=el('input',{class:'inp',type:'password',placeholder:'Repeat password',value:confirm});
      cinp.oninput=e=>confirm=e.target.value;
      card.appendChild(cinp);
    }

    const abtn=el('button',{class:'btn-primary'},tab==='login'?'Sign in →':'Create account →');
    card.appendChild(abtn);

    abtn.onclick=async()=>{
      msgArea.innerHTML='';
      if(!realEmail.trim()){showErr('Enter your login email.');return;}
      if(!password.trim()){showErr('Enter a password.');return;}
      if(tab==='create'&&!username.trim()){showErr('Enter a username for your mailbox.');return;}
      if(tab==='create'&&password!==confirm){showErr('Passwords do not match.');return;}
      abtn.disabled=true;abtn.textContent='Please wait...';
      const mailboxAddr=username.trim()+domain;
      try{
        if(tab==='login'){
          const {error}=await sb.auth.signInWithPassword({email:realEmail.trim(),password});
          if(error)throw error;
        } else {
          const {data:existing}=await sb.from('profiles').select('id').eq('email_address',mailboxAddr).maybeSingle();
          if(existing){showErr('That mailbox address is already taken. Choose another.');abtn.disabled=false;abtn.textContent='Create account →';return;}
          const {data,error}=await sb.auth.signUp({email:realEmail.trim(),password});
          if(error)throw error;
          if(data?.user){
            await sb.from('profiles').update({email_address:mailboxAddr,display_name:username.trim()}).eq('id',data.user.id);
          }
          showOk('Account created! Signing you in...');
        }
      } catch(e){showErr(e.message||'Something went wrong.');abtn.disabled=false;abtn.textContent=tab==='login'?'Sign in →':'Create account →';}
    };

    if(tab==='login'){
      card.appendChild(el('div',{class:'dhint',style:'margin-top:10px;text-align:center'},'Sign in with the real email you used to create your account'));
    }
  }
  rebuild();
  return screen;
}

// ── APP ───────────────────────────────────────────────────
function renderApp(){
  const app=el('div',{class:'app'});

  // SIDEBAR
  const sidebar=el('div',{class:'sidebar'});
  const sbh=el('div',{class:'sb-head'});
  const sbl=el('div',{class:'sb-logo'},'mail'); sbl.appendChild(el('span',{},'box'));
  const sba=el('div',{class:'sb-addr'},state.profile?.email_address||state.user?.email||'');
  sbh.appendChild(sbl); sbh.appendChild(sba);
  sidebar.appendChild(sbh);

  const cb=el('button',{class:'compose-btn'},'✏  Compose');
  cb.onclick=()=>{state.composing=true;state.replyTo='';state.replySub='';render();};
  sidebar.appendChild(cb);

  const nav=el('div',{class:'nav'});
  const FOLDERS=[
    {key:'inbox',label:'Inbox',icon:'M2 6h12v8H2zM2 6l6 5 6-5'},
    {key:'sent',label:'Sent',icon:'M15 2L1 7l5 2 2 5 7-12z'},
    {key:'drafts',label:'Drafts',icon:'M2 2h12v12H2zM5 6h6M5 9h4'},
    {key:'starred',label:'Starred',icon:'M8 2l1.8 3.6 4.2.6-3 2.9.7 4.1L8 11.3l-3.7 1.9.7-4.1-3-2.9 4.2-.6z'},
    {key:'trash',label:'Trash',icon:'M3 4h10M5 4V3h6v1M6 7v4M10 7v4M4 4l1 9h6l1-9'},
  ];
  FOLDERS.forEach(f=>{
    const count=f.key==='inbox'?state.emails.filter(e=>e.folder==='inbox'&&!e.is_read).length:0;
    const ni=el('div',{class:'ni'+(state.folder===f.key?' active':'')});
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 16 16');svg.setAttribute('fill','none');
    svg.setAttribute('stroke','currentColor');svg.setAttribute('stroke-width','1.5');
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',f.icon);svg.appendChild(path);
    ni.appendChild(svg);
    ni.appendChild(document.createTextNode(f.label));
    if(count>0){const b=el('span',{class:'nbadge'},String(count));ni.appendChild(b);}
    ni.onclick=()=>{state.folder=f.key;state.selected=null;state.search='';render();};
    nav.appendChild(ni);
  });
  sidebar.appendChild(nav);

  const foot=el('div',{class:'sb-foot'});
  const so=el('button',{class:'so-btn'},'Sign out');
  so.onclick=async()=>{await sb.auth.signOut();};
  foot.appendChild(so);
  sidebar.appendChild(foot);
  app.appendChild(sidebar);

  // EMAIL LIST
  const el2=el('div',{class:'email-list'});
  const elh=el('div',{class:'el-head'});
  const titleRow=el('div',{style:'display:flex;align-items:center'});
  titleRow.appendChild(el('div',{class:'el-title'},state.folder.charAt(0).toUpperCase()+state.folder.slice(1)));
  // realtime indicator
  const rtd=document.createElement('span');
  rtd.className='rt-dot'; rtd.title='Live updates on';
  titleRow.appendChild(rtd);
  elh.appendChild(titleRow);
  const srch=document.createElement('input');
  srch.className='search'; srch.placeholder='Search...'; srch.value=state.search;
  srch.oninput=e=>{state.search=e.target.value;renderEmailList(elbody,getFiltered());};
  elh.appendChild(srch);
  el2.appendChild(elh);
  const elbody=el('div',{class:'el-body'});
  renderEmailList(elbody,getFiltered());
  el2.appendChild(elbody);
  app.appendChild(el2);

  // EMAIL VIEW
  const ev=el('div',{class:'ev'});
  if(!state.selected){
    const emp=el('div',{class:'ev-empty'});
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 48 48');svg.setAttribute('fill','none');
    svg.setAttribute('stroke','currentColor');svg.setAttribute('stroke-width','1.5');
    const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x','4');r.setAttribute('y','8');r.setAttribute('width','40');r.setAttribute('height','32');r.setAttribute('rx','4');
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d','M4 16l20 12 20-12');
    svg.appendChild(r);svg.appendChild(p);
    emp.appendChild(svg);
    emp.appendChild(el('span',{},'Select an email to read'));
    ev.appendChild(emp);
  } else {
    const email=state.selected;
    const evh=el('div',{class:'ev-head'});
    evh.appendChild(el('div',{class:'ev-subj'},email.subject));
    const meta=el('div',{class:'ev-meta'});
    const av=el('div',{class:'ev-av'},email.from_addr.slice(0,2).toUpperCase());
    const si=el('div',{class:'ev-si'});
    si.appendChild(el('div',{class:'ev-fn'},email.from_addr.split('@')[0]));
    si.appendChild(el('div',{class:'ev-fa'},email.from_addr));
    meta.appendChild(av); meta.appendChild(si);
    meta.appendChild(el('div',{class:'ev-t'},fmtTime(email.created_at)));
    const acts=el('div',{class:'ev-acts'});

    const replyBtn=el('button',{class:'ev-btn'},'Reply');
    replyBtn.onclick=()=>{state.composing=true;state.replyTo=email.from_addr;state.replySub='Re: '+email.subject;render();};
    acts.appendChild(replyBtn);

    const starBtn=el('button',{class:'ev-btn'},email.is_starred?'★ Starred':'☆ Star');
    starBtn.onclick=async()=>{
      await sb.from('emails').update({is_starred:!email.is_starred}).eq('id',email.id);
      email.is_starred=!email.is_starred;
      const idx=state.emails.findIndex(e=>e.id===email.id);
      if(idx>=0)state.emails[idx].is_starred=email.is_starred;
      render();
    };
    acts.appendChild(starBtn);

    const delBtn=el('button',{class:'ev-btn',style:'color:var(--red)'},'Delete');
    delBtn.onclick=async()=>{
      if(email.folder==='trash'){
        await sb.from('emails').delete().eq('id',email.id);
      } else {
        await sb.from('emails').update({folder:'trash'}).eq('id',email.id);
      }
      state.emails=state.emails.filter(e=>e.id!==email.id);
      state.selected=null;
      toast(email.folder==='trash'?'Permanently deleted':'Moved to trash');
      render();
    };
    acts.appendChild(delBtn);
    meta.appendChild(acts);
    evh.appendChild(meta);
    ev.appendChild(evh);
    const evb=el('div',{class:'ev-body'},email.body||'(no content)');
    ev.appendChild(evb);
  }
  app.appendChild(ev);

  // COMPOSE
  if(state.composing){
    let cto=state.replyTo||'', csub=state.replySub||'', cbody='', sending=false;
    const overlay=el('div',{class:'overlay'});
    overlay.onclick=e=>{if(e.target===overlay){state.composing=false;render();}};
    const modal=el('div',{class:'cmodal'});
    const cmh=el('div',{class:'cm-head'});
    cmh.appendChild(el('span',{class:'cm-title'},'New message'));
    const cx=el('button',{class:'cm-x'},'×'); cx.onclick=()=>{state.composing=false;render();};
    cmh.appendChild(cx); modal.appendChild(cmh);

    function cfield(lbl,val,ph,cb){
      const f=el('div',{class:'cm-field'});
      f.appendChild(el('span',{class:'cm-lbl'},lbl));
      const i=document.createElement('input');
      i.className='cm-inp'; i.value=val; i.placeholder=ph;
      i.oninput=e=>cb(e.target.value);
      f.appendChild(i); modal.appendChild(f);
      return i;
    }
    const toInp=cfield('To',cto,'recipient@domain.com',v=>cto=v);
    cfield('Cc','','cc (optional)',()=>{});
    cfield('Sub',csub,'Subject',v=>csub=v);
    const tbody=document.createElement('textarea');
    tbody.className='cm-body'; tbody.placeholder='Write your message here...';
    tbody.oninput=e=>cbody=e.target.value;
    modal.appendChild(tbody);
    const cmf=el('div',{class:'cm-foot'});
    const sbtn=el('button',{class:'send-btn'},'Send →');
    sbtn.onclick=async()=>{
      if(!cto.trim()){toast('Enter a recipient.');return;}
      if(!csub.trim()){toast('Enter a subject.');return;}
      if(sending)return; sending=true; sbtn.disabled=true; sbtn.textContent='Sending...';
      try{
        const myAddr=state.profile?.email_address||state.user?.email;
        // Save to Sent
        const {error:e1}=await sb.from('emails').insert({
          owner_id:state.user.id,from_addr:myAddr,to_addr:cto.trim(),
          subject:csub.trim(),body:cbody,folder:'sent',is_read:true,tag:null
        });
        if(e1)throw e1;
        // Deliver to recipient inbox (RPC)
        await sb.rpc('deliver_email',{p_from:myAddr,p_to:cto.trim(),p_subject:csub.trim(),p_body:cbody,p_tag:null});
        state.composing=false;
        toast('Email sent ✓');
        await loadEmails();
        render();
      } catch(e){ toast('Error: '+e.message); sending=false; sbtn.disabled=false; sbtn.textContent='Send →'; }
    };
    const dbtn=el('button',{class:'disc-btn'},'Discard');
    dbtn.onclick=()=>{state.composing=false;render();};
    const fromLabel=el('span',{class:'cm-from'},state.profile?.email_address||'');
    cmf.appendChild(sbtn); cmf.appendChild(dbtn); cmf.appendChild(fromLabel);
    modal.appendChild(cmf);
    overlay.appendChild(modal);
    app.appendChild(overlay);
    setTimeout(()=>toInp.focus(),50);
  }

  return app;
}

function getFiltered(){
  return state.emails.filter(e=>{
    if(e.folder!==state.folder)return false;
    if(!state.search)return true;
    const q=state.search.toLowerCase();
    return e.subject?.toLowerCase().includes(q)||
           e.from_addr?.toLowerCase().includes(q)||
           e.body?.toLowerCase().includes(q);
  });
}

function renderEmailList(container, filtered){
  container.innerHTML='';
  if(filtered.length===0){
    container.appendChild(el('div',{class:'empty-list'},state.search?'No results':'This folder is empty'));
    return;
  }
  filtered.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  filtered.forEach(email=>{
    const item=el('div',{class:'eitem'+((!email.is_read&&email.folder==='inbox')?' unread':'')+(state.selected?.id===email.id?' active':'')});
    const r1=el('div',{class:'ei-r1'});
    r1.appendChild(el('span',{class:'ei-from'},email.from_addr?.split('@')[0]||'Unknown'));
    r1.appendChild(el('span',{class:'ei-time'},fmtTime(email.created_at)));
    item.appendChild(r1);
    item.appendChild(el('div',{class:'ei-sub'},email.subject||'(no subject)'));
    item.appendChild(el('div',{class:'ei-prev'},(email.body||'').slice(0,80)));
    if(email.tag)item.appendChild(el('span',{class:'etag etag-'+email.tag},email.tag));
    item.onclick=async()=>{
      state.selected=email;
      if(!email.is_read&&email.folder==='inbox'){
        await sb.from('emails').update({is_read:true}).eq('id',email.id);
        email.is_read=true;
      }
      render();
    };
    container.appendChild(item);
  });
}

// ── DATA LAYER ───────────────────────────────────────────
async function loadProfile(){
  const {data}=await sb.from('profiles').select('*').eq('id',state.user.id).single();
  state.profile=data;
}

async function loadEmails(){
  const {data,error}=await sb.from('emails').select('*').eq('owner_id',state.user.id).order('created_at',{ascending:false});
  if(!error)state.emails=data||[];
}

function setupRealtime(){
  if(realtimeSub)supabase.removeChannel(realtimeSub);
  realtimeSub=sb.channel('emails-'+state.user.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'emails',filter:'owner_id=eq.'+state.user.id},
      async(payload)=>{
        state.emails.unshift(payload.new);
        if(payload.new.folder==='inbox')toast('📬 New email from '+payload.new.from_addr);
        render();
      }
    )
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'emails',filter:'owner_id=eq.'+state.user.id},
      (payload)=>{
        const idx=state.emails.findIndex(e=>e.id===payload.new.id);
        if(idx>=0)state.emails[idx]=payload.new;
        if(state.selected?.id===payload.new.id)state.selected=payload.new;
        render();
      }
    )
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'emails',filter:'owner_id=eq.'+state.user.id},
      (payload)=>{
        state.emails=state.emails.filter(e=>e.id!==payload.old.id);
        if(state.selected?.id===payload.old.id)state.selected=null;
        render();
      }
    )
    .subscribe();
}

// ── BOOT ─────────────────────────────────────────────────
async function init(){
  // Check for existing session
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    state.user=session.user;
    await loadProfile();
    await loadEmails();
    setupRealtime();
  }
  state.loading=false;
  render();

  // Auth state changes
  sb.auth.onAuthStateChange(async(_event,session)=>{
    if(session){
      state.user=session.user;
      state.loading=true; render();
      await loadProfile();
      await loadEmails();
      setupRealtime();
      state.loading=false;
    } else {
      state.user=null;state.profile=null;state.emails=[];
      state.selected=null;state.composing=false;
      if(realtimeSub){sb.removeChannel(realtimeSub);realtimeSub=null;}
    }
    render();
  });
}

init();
</script>
